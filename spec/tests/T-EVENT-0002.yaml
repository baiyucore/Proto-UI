id: T-EVENT-0002
type: test
title: Event type and payload tests
status: draft
since: 0.1.0
summary: Shared fixtures and implementation tests for EventTypeV0 validation, host-bound event prefixing, portable payload shape, and expose-event emit ownership.
cases:
  - id: T-EVENT-0002-CASE-TYPE-VALIDATION
    title: Event type validation accepts only declared layers
    covers:
      - C-EVENT-TYPE-0001-A
      - C-EVENT-TYPE-0001-B
      - C-EVENT-TYPE-0002-A
      - C-EVENT-TYPE-0003-C
      - C-EVENT-TYPE-0003-D
      - C-EVENT-TYPE-0004-A
    expectation: type-layer-validation
  - id: T-EVENT-0002-CASE-CORE-PAYLOAD
    title: Key core events expose minimal portable key payload
    covers:
      - C-EVENT-0002-I
      - C-EVENT-0002-J
      - C-EVENT-TYPE-0002-F
    expectation: core-event-payload
  - id: T-EVENT-0002-CASE-OPTIONAL-PAYLOAD
    title: Optional pointer events expose event type while native details remain host-local
    covers:
      - C-EVENT-0002-I
      - C-EVENT-0002-K
      - C-EVENT-TYPE-0003-B
    expectation: optional-event-payload
  - id: T-EVENT-0002-CASE-HOST-BOUND
    title: Host-bound event types use host:* and keep lifecycle guarantees only
    covers:
      - C-EVENT-TYPE-0004-A
      - C-EVENT-TYPE-0004-B
      - C-EVENT-TYPE-0004-C
      - C-EVENT-TYPE-0004-D
      - C-EVENT-TYPE-0004-E
    expectation: host-bound-event
  - id: T-EVENT-0002-CASE-EXPOSE-EMIT
    title: Expose event emission is surfaced as run.expose.emit rather than Event runtime API
    covers:
      - C-EVENT-0002-G
      - C-EVENT-0002-H
    expectation: expose-emit-is-expose
implementations:
  - id: event-type-payload-fixture
    kind: fixture
    status: active
    path: packages/spec/fixtures/src/event/type-payload.ts
    required: true
    consumesCases:
      - T-EVENT-0002-CASE-TYPE-VALIDATION
      - T-EVENT-0002-CASE-CORE-PAYLOAD
      - T-EVENT-0002-CASE-OPTIONAL-PAYLOAD
      - T-EVENT-0002-CASE-HOST-BOUND
      - T-EVENT-0002-CASE-EXPOSE-EMIT
  - id: module-event-type-validation-contract
    kind: module-test
    status: passing
    path: packages/modules/event/test/contract/event-module.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EVENT-0002-CASE-TYPE-VALIDATION
      - T-EVENT-0002-CASE-HOST-BOUND
  - id: adapter-web-component-event-payload-contract
    kind: adapter-test
    status: passing
    path: packages/adapters/web-component/test/contract/event.router.mapping.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EVENT-0002-CASE-CORE-PAYLOAD
      - T-EVENT-0002-CASE-OPTIONAL-PAYLOAD
  - id: adapter-web-component-host-bound-event-contract
    kind: adapter-test
    status: passing
    path: packages/adapters/web-component/test/contract/event.router.host-bound.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EVENT-0002-CASE-HOST-BOUND
  - id: runtime-expose-event-emit-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/expose-event.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EVENT-0002-CASE-EXPOSE-EMIT
verifies:
  contracts:
    - id: C-EVENT-0002
      anchors:
        - C-EVENT-0002-G
        - C-EVENT-0002-H
        - C-EVENT-0002-I
        - C-EVENT-0002-J
        - C-EVENT-0002-K
    - id: C-EVENT-TYPE-0001
      anchors:
        - C-EVENT-TYPE-0001-A
        - C-EVENT-TYPE-0001-B
    - id: C-EVENT-TYPE-0002
      anchors:
        - C-EVENT-TYPE-0002-A
        - C-EVENT-TYPE-0002-F
    - id: C-EVENT-TYPE-0003
      anchors:
        - C-EVENT-TYPE-0003-B
        - C-EVENT-TYPE-0003-C
        - C-EVENT-TYPE-0003-D
    - id: C-EVENT-TYPE-0004
      anchors:
        - C-EVENT-TYPE-0004-A
        - C-EVENT-TYPE-0004-B
        - C-EVENT-TYPE-0004-C
        - C-EVENT-TYPE-0004-D
        - C-EVENT-TYPE-0004-E
exercises:
  contracts:
    - id: C-EVENT-0001
      role: test-surface
      coverageImpact: exercises-test-surface
      note: Exercises the Event/expose channel boundary for emitted expose events.
revisions:
