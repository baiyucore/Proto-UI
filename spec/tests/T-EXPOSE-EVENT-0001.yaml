id: T-EXPOSE-EVENT-0001
type: test
title: Expose event outward signal tests
status: draft
since: 0.1.0
summary: Shared fixtures and runtime tests for expose event declaration, runtime emission, unregistered key failure, and payload declaration metadata.
cases:
  - id: T-EXPOSE-EVENT-0001-CASE-DECLARE-EMIT
    title: Declared expose events emit Component to App Maker outward signals
    covers:
      - C-EXPOSE-EVENT-0001-A
      - C-EXPOSE-EVENT-0001-B
      - C-EXPOSE-EVENT-0001-D
      - C-EXPOSE-EVENT-0001-E
      - C-EXPOSE-EVENT-0001-F
    expectation: outward-signal-declared-and-emitted
  - id: T-EXPOSE-EVENT-0001-CASE-UNREGISTERED
    title: Runtime emit rejects unregistered expose event keys
    covers:
      - C-EXPOSE-EVENT-0001-C
    expectation: unregistered-signal-rejected
  - id: T-EXPOSE-EVENT-0001-CASE-PAYLOAD-SPEC
    title: Payload spec is declaration metadata rather than runtime validation
    covers:
      - C-EXPOSE-EVENT-0002-A
      - C-EXPOSE-EVENT-0002-B
      - C-EXPOSE-EVENT-0002-C
      - C-EXPOSE-EVENT-0002-D
      - C-EXPOSE-EVENT-0002-E
    expectation: payload-spec-carried
implementations:
  - id: expose-event-fixture
    kind: fixture
    status: active
    path: packages/spec/fixtures/src/expose/event.ts
    required: true
    consumesCases:
      - T-EXPOSE-EVENT-0001-CASE-DECLARE-EMIT
      - T-EXPOSE-EVENT-0001-CASE-UNREGISTERED
      - T-EXPOSE-EVENT-0001-CASE-PAYLOAD-SPEC
  - id: runtime-expose-event-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/expose-event.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-EVENT-0001-CASE-DECLARE-EMIT
      - T-EXPOSE-EVENT-0001-CASE-UNREGISTERED
      - T-EXPOSE-EVENT-0001-CASE-PAYLOAD-SPEC
verifies:
  contracts:
    - id: C-EXPOSE-EVENT-0001
      anchors:
        - C-EXPOSE-EVENT-0001-A
        - C-EXPOSE-EVENT-0001-B
        - C-EXPOSE-EVENT-0001-C
        - C-EXPOSE-EVENT-0001-D
        - C-EXPOSE-EVENT-0001-E
        - C-EXPOSE-EVENT-0001-F
    - id: C-EXPOSE-EVENT-0002
      anchors:
        - C-EXPOSE-EVENT-0002-A
        - C-EXPOSE-EVENT-0002-B
        - C-EXPOSE-EVENT-0002-C
        - C-EXPOSE-EVENT-0002-D
        - C-EXPOSE-EVENT-0002-E
revisions:
  - version: 0.1.0
    change: introduced
    summary: Added expose event test entity and fixture mapping.
tags:
  - expose
  - event
  - signal
  - contract-test
