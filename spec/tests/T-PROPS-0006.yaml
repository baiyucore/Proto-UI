  contracts:
    - id: C-PROPS-0009
      anchors:
        - C-PROPS-0009-A
        - C-PROPS-0009-B
        - C-PROPS-0009-C
        - C-PROPS-0009-D
        - C-PROPS-0009-E
        - C-PROPS-0009-F
        - C-PROPS-0009-G
        - C-PROPS-0009-H
