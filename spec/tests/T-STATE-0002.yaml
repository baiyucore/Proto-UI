        - C-STATE-0007-D
        - C-STATE-0007-E
    - id: C-STATE-0008
      anchors:
        - C-STATE-0008-A
        - C-STATE-0008-B
        - C-STATE-0008-C
        - C-STATE-0008-D
        - C-STATE-0008-E
    - id: C-STATE-0009
      anchors:
        - C-STATE-0009-B
        - C-STATE-0009-C
        - C-STATE-0009-D
        - C-STATE-0009-E
revisions:
