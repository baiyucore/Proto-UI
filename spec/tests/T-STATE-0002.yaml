id: T-STATE-0002
type: test
title: State view capability tests
status: draft
since: 0.1.0
summary: Runtime and module tests for owned, borrowed, observed, and exposed state capability boundaries.
cases:
  - id: T-STATE-0002-CASE-OWNED
    title: Owned views expose get, setDefault, and set, but not watch
    covers:
      - C-STATE-0003-A
      - C-STATE-0003-B
      - C-STATE-0003-C
      - C-STATE-0007-B
      - C-STATE-0007-C
      - C-STATE-0007-D
      - C-STATE-0007-E
    expectation: owned-view-capabilities
  - id: T-STATE-0002-CASE-BORROWED
    title: Borrowed views expose shared-control capabilities
    covers:
      - C-STATE-0003-B
      - C-STATE-0003-C
      - C-STATE-0008-A
      - C-STATE-0008-B
      - C-STATE-0008-C
      - C-STATE-0008-D
      - C-STATE-0008-E
    expectation: borrowed-view-capabilities
  - id: T-STATE-0002-CASE-OBSERVED
    title: Observed views expose read-only observation capabilities
    covers:
      - C-STATE-0003-B
      - C-STATE-0003-C
      - C-STATE-0009-B
      - C-STATE-0009-C
      - C-STATE-0009-D
      - C-STATE-0009-E
    expectation: observed-view-capabilities
  - id: T-STATE-0002-CASE-EXPOSED
    title: Exposed App Maker state is distinct from prototype-author views
    covers:
      - C-STATE-0003-D
    expectation: exposed-state-view-is-external
implementations:
  - id: runtime-state-owned-view-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/state-basic.v0.contract.test.ts
    required: true
    consumesCases:
      - T-STATE-0002-CASE-OWNED
  - id: module-state-view-capability-contract
    kind: module-test
    status: passing
    path: packages/modules/state/test/port.v0.test.ts
    required: true
    consumesCases:
      - T-STATE-0002-CASE-BORROWED
      - T-STATE-0002-CASE-OBSERVED
  - id: runtime-as-hook-state-view-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/as-hook.v0.contract.test.ts
    required: true
    consumesCases:
      - T-STATE-0002-CASE-BORROWED
  - id: runtime-expose-state-view-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/expose-state.v0.contract.test.ts
    required: true
    consumesCases:
      - T-STATE-0002-CASE-EXPOSED
verifies:
  contracts:
    - id: C-STATE-0003
      anchors:
        - C-STATE-0003-A
        - C-STATE-0003-B
        - C-STATE-0003-C
        - C-STATE-0003-D
    - id: C-STATE-0007
      anchors:
        - C-STATE-0007-B
