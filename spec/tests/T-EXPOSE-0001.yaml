id: T-EXPOSE-0001
type: test
title: Expose channel surface tests
status: draft
since: 0.1.0
summary: Shared fixtures and module/runtime/adapter tests for expose channel positioning, setup registration, shared keys, classified entries, record access, and lifecycle cleanup.
cases:
  - id: T-EXPOSE-0001-CASE-CHANNEL
    title: Expose is the Component to App Maker information channel
    covers:
      - C-EXPOSE-0001-A
      - C-EXPOSE-0001-B
      - C-EXPOSE-0001-C
      - C-EXPOSE-0001-D
      - C-EXPOSE-0001-E
      - C-EXPOSE-0002-A
      - C-EXPOSE-0002-B
      - C-EXPOSE-0002-C
      - C-EXPOSE-0002-D
    expectation: component-to-app-maker-channel
  - id: T-EXPOSE-0001-CASE-SETUP-ONLY
    title: Expose registration is setup-only
    covers:
      - C-EXPOSE-0003-A
      - C-EXPOSE-0003-B
      - C-EXPOSE-0003-C
      - C-EXPOSE-0003-D
      - C-EXPOSE-0003-E
    expectation: setup-only-registration
  - id: T-EXPOSE-0001-CASE-SHARED-KEYS
    title: Expose classifications share one key namespace
    covers:
      - C-EXPOSE-0004-A
      - C-EXPOSE-0004-B
      - C-EXPOSE-0004-C
      - C-EXPOSE-0005-F
    expectation: shared-key-namespace
  - id: T-EXPOSE-0001-CASE-RECORD
    title: App Maker can read exposes without mutating the live registry
    covers:
      - C-EXPOSE-0004-D
      - C-EXPOSE-0004-E
      - C-EXPOSE-0004-F
    expectation: record-snapshot-access
  - id: T-EXPOSE-0001-CASE-VALUE-METHOD
    title: Value and method expose entries preserve their classified semantics
    covers:
      - C-EXPOSE-0005-A
      - C-EXPOSE-0005-B
      - C-EXPOSE-0005-D
      - C-EXPOSE-0006-A
      - C-EXPOSE-0006-B
      - C-EXPOSE-0006-C
      - C-EXPOSE-0006-D
      - C-EXPOSE-0006-E
      - C-EXPOSE-0007-A
      - C-EXPOSE-0007-B
      - C-EXPOSE-0007-C
      - C-EXPOSE-0007-D
      - C-EXPOSE-0007-E
    expectation: classified-value-method
  - id: T-EXPOSE-0001-CASE-LIFECYCLE
    title: Expose entries are scoped to instance lifecycle
    covers:
      - C-EXPOSE-0008-A
      - C-EXPOSE-0008-B
      - C-EXPOSE-0008-C
      - C-EXPOSE-0008-D
    expectation: lifecycle-cleanup
implementations:
  - id: expose-surface-fixture
    kind: fixture
    status: active
    path: packages/spec/fixtures/src/expose/surfaces.ts
    required: true
    consumesCases:
      - T-EXPOSE-0001-CASE-CHANNEL
      - T-EXPOSE-0001-CASE-SETUP-ONLY
      - T-EXPOSE-0001-CASE-SHARED-KEYS
      - T-EXPOSE-0001-CASE-RECORD
      - T-EXPOSE-0001-CASE-VALUE-METHOD
      - T-EXPOSE-0001-CASE-LIFECYCLE
  - id: module-expose-contract
    kind: module-test
    status: passing
    path: packages/modules/expose/test/impl-spec.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-0001-CASE-SETUP-ONLY
      - T-EXPOSE-0001-CASE-SHARED-KEYS
      - T-EXPOSE-0001-CASE-RECORD
      - T-EXPOSE-0001-CASE-LIFECYCLE
  - id: adapter-web-component-expose-basic-contract
    kind: adapter-test
    status: passing
    path: packages/adapters/web-component/test/contract/expose.basic.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-0001-CASE-RECORD
      - T-EXPOSE-0001-CASE-VALUE-METHOD
      - T-EXPOSE-0001-CASE-LIFECYCLE
  - id: runtime-as-hook-expose-capture-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/as-hook.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-0001-CASE-VALUE-METHOD
