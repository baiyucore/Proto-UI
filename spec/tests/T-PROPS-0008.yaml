    - id: C-PROPS-0012
      anchors:
        - C-PROPS-0012-A
        - C-PROPS-0012-B
        - C-PROPS-0012-C
        - C-PROPS-0012-D
        - C-PROPS-0012-E
        - C-PROPS-0012-F
        - C-PROPS-0012-G
        - C-PROPS-0012-H
        - C-PROPS-0012-I
        - C-PROPS-0012-J
        - C-PROPS-0012-K
        - C-PROPS-0012-L
