id: T-EXPOSE-STATE-0001
type: test
title: Expose state external handle tests
status: draft
since: 0.1.0
summary: Shared fixtures and module/runtime/adapter tests for projecting exposed state to App Maker external handles with read, subscribe, spec, no-write, same-source, and lifecycle behavior.
cases:
  - id: T-EXPOSE-STATE-0001-CASE-EXTERNAL-HANDLE
    title: Exposed state is projected as an external state handle
    covers:
      - C-EXPOSE-STATE-0001-A
      - C-EXPOSE-STATE-0001-B
      - C-EXPOSE-STATE-0001-C
      - C-EXPOSE-STATE-0001-D
      - C-EXPOSE-STATE-0001-E
      - C-STATE-0003-D
    expectation: external-state-handle-shape
  - id: T-EXPOSE-STATE-0001-CASE-SAME-SOURCE
    title: External get and subscribe reflect the same-source internal state
    covers:
      - C-EXPOSE-STATE-0001-G
      - C-EXPOSE-STATE-0001-H
      - C-STATE-0011-A
    expectation: same-source-state-updates
  - id: T-EXPOSE-STATE-0001-CASE-READ-ONLY
    title: External state handle does not expose write capability
    covers:
      - C-EXPOSE-STATE-0001-F
    expectation: read-only-external-state
  - id: T-EXPOSE-STATE-0001-CASE-LIFECYCLE
    title: Expose-state external handles inherit expose lifecycle safety
    covers:
      - C-EXPOSE-0008-B
      - C-EXPOSE-0008-E
    expectation: state-surface-lifecycle
implementations:
  - id: expose-state-fixture
    kind: fixture
    status: active
    path: packages/spec/fixtures/src/expose/state.ts
    required: true
    consumesCases:
      - T-EXPOSE-STATE-0001-CASE-EXTERNAL-HANDLE
      - T-EXPOSE-STATE-0001-CASE-SAME-SOURCE
      - T-EXPOSE-STATE-0001-CASE-READ-ONLY
      - T-EXPOSE-STATE-0001-CASE-LIFECYCLE
  - id: module-expose-state-contract
    kind: module-test
    status: passing
    path: packages/modules/expose-state/test/impl-spec.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-STATE-0001-CASE-EXTERNAL-HANDLE
      - T-EXPOSE-STATE-0001-CASE-SAME-SOURCE
      - T-EXPOSE-STATE-0001-CASE-READ-ONLY
      - T-EXPOSE-STATE-0001-CASE-LIFECYCLE
  - id: runtime-expose-state-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/expose-state.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-STATE-0001-CASE-EXTERNAL-HANDLE
      - T-EXPOSE-STATE-0001-CASE-SAME-SOURCE
      - T-EXPOSE-STATE-0001-CASE-READ-ONLY
  - id: adapter-web-component-expose-state-contract
    kind: adapter-test
    status: passing
    path: packages/adapters/web-component/test/contract/expose.basic.v0.contract.test.ts
    required: true
    consumesCases:
      - T-EXPOSE-STATE-0001-CASE-EXTERNAL-HANDLE
      - T-EXPOSE-STATE-0001-CASE-SAME-SOURCE
      - T-EXPOSE-STATE-0001-CASE-READ-ONLY
verifies:
  contracts:
    - id: C-EXPOSE-STATE-0001
      anchors:
        - C-EXPOSE-STATE-0001-A
        - C-EXPOSE-STATE-0001-B
        - C-EXPOSE-STATE-0001-C
        - C-EXPOSE-STATE-0001-D
        - C-EXPOSE-STATE-0001-E
        - C-EXPOSE-STATE-0001-F
        - C-EXPOSE-STATE-0001-G
        - C-EXPOSE-STATE-0001-H
    - id: C-EXPOSE-0008
      anchors:
        - C-EXPOSE-0008-B
        - C-EXPOSE-0008-E
exercises:
  contracts:
    - id: C-STATE-0003
      role: api-surface
      coverageImpact: exercises-test-surface
      note: Exercises the App-Maker-facing external state view boundary.
    - id: C-STATE-0011
      role: test-surface
      coverageImpact: exercises-test-surface
      note: Exercises same-source state observation through expose-state.
revisions:
  - version: 0.1.0
    change: introduced
    summary: Added expose-state test entity and shared fixture mapping.
tags:
  - expose
  - state
  - contract-test
