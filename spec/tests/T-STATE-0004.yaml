id: T-STATE-0004
type: test
title: State watch, event, and lifecycle tests
status: draft
since: 0.1.0
summary: Module and runtime tests for setup-only watch registration, StateEvent delivery, deterministic ordering, and lifecycle cleanup.
cases:
  - id: T-STATE-0004-CASE-WATCH-SETUP-ONLY
    title: Watch registration is setup-only and absent from owned views
    covers:
      - C-STATE-0004-D
      - C-STATE-0010-A
      - C-STATE-0010-B
    expectation: watch-registration-setup-only
  - id: T-STATE-0004-CASE-WATCH-EVENTS
    title: Watch callbacks receive portable StateEvent records
    covers:
      - C-STATE-0010-C
      - C-STATE-0011-A
      - C-STATE-0011-B
      - C-STATE-0011-C
    expectation: next-event-records
  - id: T-STATE-0004-CASE-REENTRANT-ORDER
    title: Re-entrant state events are delivered in deterministic order
    covers:
      - C-STATE-0011-E
    expectation: deterministic-reentrant-order
  - id: T-STATE-0004-CASE-DISCONNECT-CLEANUP
    title: Watch registrations disconnect and clean up with instance lifecycle
    covers:
      - C-STATE-0010-E
      - C-STATE-0011-D
      - C-STATE-0012-C
      - C-STATE-0012-D
      - C-STATE-0012-E
    expectation: disconnect-and-cleanup
  - id: T-STATE-0004-CASE-LIFECYCLE-ALIVE
    title: State views remain usable while the instance is alive
    covers:
      - C-STATE-0012-A
      - C-STATE-0012-B
    expectation: alive-instance-view-use
implementations:
  - id: module-state-port-watch-contract
    kind: module-test
    status: passing
    path: packages/modules/state/test/port.v0.test.ts
    required: true
    consumesCases:
      - T-STATE-0004-CASE-WATCH-SETUP-ONLY
      - T-STATE-0004-CASE-WATCH-EVENTS
      - T-STATE-0004-CASE-REENTRANT-ORDER
      - T-STATE-0004-CASE-DISCONNECT-CLEANUP
  - id: module-state-kernel-event-contract
    kind: module-test
    status: passing
    path: packages/modules/state/test/kernel.v0.test.ts
    required: true
    consumesCases:
      - T-STATE-0004-CASE-WATCH-EVENTS
      - T-STATE-0004-CASE-REENTRANT-ORDER
  - id: runtime-state-lifecycle-contract
    kind: runtime-test
    status: passing
    path: packages/runtime/test/contract/state-basic.v0.contract.test.ts
    required: true
    consumesCases:
      - T-STATE-0004-CASE-LIFECYCLE-ALIVE
      - T-STATE-0004-CASE-DISCONNECT-CLEANUP
verifies:
  contracts:
    - id: C-STATE-0004
      anchors:
        - C-STATE-0004-D
    - id: C-STATE-0010
      anchors:
        - C-STATE-0010-A
        - C-STATE-0010-B
        - C-STATE-0010-C
        - C-STATE-0010-E
    - id: C-STATE-0011
      anchors:
        - C-STATE-0011-A
        - C-STATE-0011-B
        - C-STATE-0011-C
        - C-STATE-0011-D
        - C-STATE-0011-E
    - id: C-STATE-0012
      anchors:
        - C-STATE-0012-A
        - C-STATE-0012-B
        - C-STATE-0012-C
        - C-STATE-0012-D
        - C-STATE-0012-E
exercises:
  contracts:
    - id: C-STATE-0005
      role: execution-order
      coverageImpact: exercises-test-surface
      note: Exercises watch callbacks as state-change records that do not themselves schedule render or update.
revisions:
  - version: 0.1.0
    change: introduced
    summary: Added state watch, StateEvent, and lifecycle test mapping.
tags:
  - state
  - watch
  - lifecycle
  - contract-test
