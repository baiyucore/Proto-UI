id: K-COMPONENT-INTERACTION-0001
type: knowledge
title: A component is an interactive subject
status: draft
since: 0.1.0
summary: Proto UI treats a component as a stable interactive subject before treating it as a host-specific implementation.
statement:
  zh-CN: 组件首先是一个相对稳定的交互主体；它能够与外部对象交换信息，并在这些关系中保持可识别的身份。
  en: A component is first a relatively stable interactive subject; it can exchange information with external objects and keep an identifiable identity in those relationships.
criteria:
  - id: K-COMPONENT-INTERACTION-0001-A
    text:
      zh-CN: 组件不能只被理解为某个宿主中的代码形态；代码形态只是交互主体在特定宿主中的实现方式之一。
      en: A component must not be understood only as a code form in a host; code form is only one implementation form of the interactive subject in a specific host.
  - id: K-COMPONENT-INTERACTION-0001-B
    text:
      zh-CN: 如果抹掉组件与人、应用、其他组件或环境之间的关系，剩下的只是实现，而不是完整的可交互单位。
      en: If relationships between the component and people, applications, other components, or the environment are erased, what remains is an implementation rather than a complete interactive unit.
  - id: K-COMPONENT-INTERACTION-0001-C
    text:
      zh-CN: Proto UI 的原型描述必须始终指向一个会成立的交互主体，而不是一组可脱离主体存在的局部能力。
      en: A Proto UI prototype description must keep pointing to a valid interactive subject rather than detached local capabilities.
