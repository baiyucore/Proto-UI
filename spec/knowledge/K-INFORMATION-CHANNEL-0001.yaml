id: K-INFORMATION-CHANNEL-0001
type: knowledge
title: Information channels are derived from actor relationships
status: draft
since: 0.1.0
summary: Proto UI organizes component capabilities by first asking who exchanges information with the component and then asking which capabilities express that exchange.
statement:
  zh-CN: 信息通路不是 API 名字的分类，而是从组件与交互对象之间的信息交换关系中推导出的组织原则。
  en: An information channel is not a category of API names; it is an organizing principle derived from information exchange between a component and its interaction targets.
criteria:
  - id: K-INFORMATION-CHANNEL-0001-A
    text:
      zh-CN: 判断一条通路时，必须先看组件正在和谁交换信息，再看这种交换需要怎样的能力表达。
      en: When identifying a channel, Proto UI must first ask who the component is exchanging information with, then ask what capabilities are needed to express that exchange.
  - id: K-INFORMATION-CHANNEL-0001-B
    text:
      zh-CN: 新通路不能只是已有通路的技术别名或 API surface 变体；它需要对应一种稳定且重要的交互对象身份或关系方向。
      en: A new channel must not be merely a technical alias or API-surface variant of an existing channel; it needs to correspond to a stable and important interaction-target identity or relationship direction.
  - id: K-INFORMATION-CHANNEL-0001-C
    text:
      zh-CN: AI Agent 等新参与者只有在不能沿 User、Maker、Other Component 或 host/environment 身份被吸收时，才可能构成新的哲学使用者身份。
      en: A new participant such as an AI agent can form a new philosophical actor identity only when it cannot be absorbed as User, Maker, Other Component, or host/environment.
  - id: K-INFORMATION-CHANNEL-0001-D
    text:
      zh-CN: Host/environment 相关交换可以被承认和维护，但默认不构成核心可移植通路。
      en: Host/environment-related exchange can be acknowledged and maintained, but by default it does not form a core portable channel.
sources:
  - path: apps/www/src/content/docs/zh-cn/whitepaper/information-flow-model.md
    sections:
      - 什么是信息通路？
      - 为什么这些能力不是随意枚举出来的？
      - 信息通路可以扩展吗？
  - path: apps/www/src/content/docs/en/whitepaper/information-flow-model.md
    sections:
      - What is an information flow?
      - Why are these capabilities not arbitrarily enumerated?
      - Can information flows be extended?
