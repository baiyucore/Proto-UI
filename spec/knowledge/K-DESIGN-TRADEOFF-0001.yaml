id: K-DESIGN-TRADEOFF-0001
type: knowledge
title: Semantic consistency has priority over authoring convenience
status: draft
since: 0.1.0
summary: Proto UI prioritizes semantic consistency, including portability, over user, maker, and prototype author convenience when these goals conflict.
statement:
  zh-CN: Proto UI 的设计取舍顺序是语义一致性优先；当语义一致性、User 体验、Maker 体验和原型 Author 体验冲突时，语义一致性排在最前。
  en: Proto UI's design tradeoff order gives semantic consistency first priority; when semantic consistency, User experience, Maker experience, and prototype Author experience conflict, semantic consistency comes first.
criteria:
  - id: K-DESIGN-TRADEOFF-0001-A
    text:
      zh-CN: Proto UI 的取舍顺序为：语义一致性 > User 体验 > Maker 体验 > 原型 Author 体验。
      en: Proto UI's tradeoff order is semantic consistency > User experience > Maker experience > prototype Author experience.
  - id: K-DESIGN-TRADEOFF-0001-B
    text:
      zh-CN: 语义一致性要求同一个原型在不同适配结果中仍然保持同一个交互主体身份。
      en: Semantic consistency requires the same prototype to remain the same interactive subject across different adaptation results.
  - id: K-DESIGN-TRADEOFF-0001-C
    text:
      zh-CN: 可移植性是语义一致性的重要组成部分；依赖不可移植的数据会削弱跨宿主语义一致性的保证。
      en: Portability is an important part of semantic consistency; depending on non-portable data weakens the guarantee of cross-host semantic consistency.
  - id: K-DESIGN-TRADEOFF-0001-D
    text:
      zh-CN: 协议层默认优先采用可序列化表达，即使这会降低某些原型作者的表达便利性。
      en: The protocol layer prefers serializable expression by default, even when that reduces some convenience for prototype authors.
