id: K-COMPONENT-ACTOR-0001
type: knowledge
title: Component interaction targets define actor identities
status: draft
since: 0.1.0
summary: Proto UI classifies component interaction targets by their role in relation to the component, not by product-team role or implementation form.
statement:
  zh-CN: Proto UI 按照交互对象与组件发生关系的方式，区分 User、Maker、Other Component，以及 host/environment 相关对象。
  en: Proto UI distinguishes User, Maker, Other Component, and host/environment-related objects by how the interaction target relates to the component.
criteria:
  - id: K-COMPONENT-ACTOR-0001-A
    text:
      zh-CN: User 指直接感知并操作组件的对象。
      en: User refers to the object that directly perceives and operates the component.
  - id: K-COMPONENT-ACTOR-0001-B
    text:
      zh-CN: Maker 指组装、配置、消费组件的人、系统、应用代码或上层业务逻辑。
      en: Maker refers to a person, system, application code, or upper-level business logic that assembles, configures, or consumes the component.
  - id: K-COMPONENT-ACTOR-0001-C
    text:
      zh-CN: Other Component 指与当前组件共享环境、传递语义或建立协作关系的其他组件。
      en: Other Component refers to other components that share environment, convey semantics, or form cooperation with the current component.
  - id: K-COMPONENT-ACTOR-0001-D
    text:
      zh-CN: Host/environment 相关对象可以与组件发生交互，但默认不属于 Proto UI 核心可移植性保证的主轴。
      en: Host/environment-related objects can interact with a component, but by default they are not the main axis of Proto UI's core portability guarantee.
    rationale:
      zh-CN: 越靠近具体宿主，越难成为跨宿主协议的一部分；Proto UI 可以承认并维护宿主相关方向，但会审慎决定它是否进入核心原型。
      en: The closer something is to a specific host, the harder it is to make it part of a cross-host protocol; Proto UI can acknowledge and maintain host-related directions while remaining cautious about admitting them into the core prototype.
sources:
  - path: apps/www/src/content/docs/zh-cn/whitepaper/information-flow-model.md
    sections:
