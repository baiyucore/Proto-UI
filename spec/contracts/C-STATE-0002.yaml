id: C-STATE-0002
type: contract
title: State definition is setup-only
status: draft
since: 0.1.0
summary: The author-facing state definition API is `def.state.*`, and it may only define state slots during setup.
statement:
  zh-CN: >-
    State 的原型作者侧定义 API 是 `def.state.*`，其唯一核心形式是在 setup 期间定义一个状态。定义语法产出一个 state slot 的受控视图，而不是把裸 state 实例或数据源直接交给原型作者。


  en: >-
    The prototype-author-facing State definition API is `def.state.*`, whose only core form is defining a state during setup. Definition syntax produces a controlled view of a state slot rather than handing the raw state instance or data source directly to the prototype author.


criteria:
  - id: C-STATE-0002-A
    text:
      zh-CN: '`def.state.*` API 必须只能在 setup 期间调用。'
      en: '`def.state.*` APIs must only be callable during setup.'
  - id: C-STATE-0002-B
    text:
      zh-CN: setup 结束后调用任一 `def.state.*` 定义 API 必须失败。
      en: Calling any `def.state.*` definition API after setup exits must fail.
  - id: C-STATE-0002-C
    text:
      zh-CN: '`def.state.*` 定义 API 的产物必须是 state slot 的 view，而不是裸 state 实例或数据源。'
      en: The result of a `def.state.*` definition API must be a view of the state slot, not the raw state instance or data source.
  - id: C-STATE-0002-D
    text:
      zh-CN: 通过当前原型直接创建且完全受当前原型控制的 state 定义必须返回 owned view。
      en: A state defined directly by and fully controlled by the current prototype must return an owned view.
sources:
