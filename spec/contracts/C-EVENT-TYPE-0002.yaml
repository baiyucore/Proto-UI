id: C-EVENT-TYPE-0002
type: contract
title: Protocol core events model portable interaction intent
status: draft
since: 0.1.0
summary: Protocol core events such as `press.*` and `key.*` describe portable interaction intent rather than concrete host events.
statement:
  zh-CN: >-
    Protocol core event 必须描述跨宿主的用户交互意图，而不是具体设备、框架或宿主事件。v0 core event family 包含 `press.start`、`press.end`、`press.cancel`、`press.commit`、`key.down` 与 `key.up`。其中 `press.*` 表达 activation intent 的生命周期，`key.*` 表达输入通道的按下与释放。Adapter 可以由 pointer、keyboard、accessibility input 或其他宿主输入合成这些 core event，但必须保持其语义。


  en: >-
    Protocol core events must describe cross-host user interaction intent rather than concrete devices, frameworks, or host events. The v0 core event families include `press.start`, `press.end`, `press.cancel`, `press.commit`, `key.down`, and `key.up`. `press.*` expresses the lifecycle of activation intent, while `key.*` expresses press and release of an input channel. Adapters may synthesize these core events from pointer, keyboard, accessibility input, or other host inputs, but must preserve their semantics.


criteria:
  - id: C-EVENT-TYPE-0002-A
    text:
      zh-CN: v0 protocol core event set 必须包含 `press.start`、`press.end`、`press.cancel`、`press.commit`、`key.down` 与 `key.up`。
      en: The v0 protocol core event set must include `press.start`, `press.end`, `press.cancel`, `press.commit`, `key.down`, and `key.up`.
  - id: C-EVENT-TYPE-0002-B
    text:
      zh-CN: '`press.start` 必须表示 activation intent 开始。'
      en: '`press.start` must mean activation intent begins.'
  - id: C-EVENT-TYPE-0002-C
    text:
      zh-CN: '`press.end` 必须表示 activation intent 结束，无论该 activation 是否成功。'
      en: '`press.end` must mean activation intent ends, regardless of whether the activation succeeds.'
  - id: C-EVENT-TYPE-0002-D
    text:
      zh-CN: '`press.commit` 必须表示一次有效 activation 已确认完成。'
      en: '`press.commit` must mean a valid activation has been confirmed.'
  - id: C-EVENT-TYPE-0002-E
    text:
      zh-CN: '`press.cancel` 必须表示 activation intent 被取消，且不得被视为成功 activation。'
      en: '`press.cancel` must mean activation intent is canceled and must not be treated as a successful activation.'
  - id: C-EVENT-TYPE-0002-F
    text:
      zh-CN: '`key.down` 与 `key.up` 必须表达输入通道的按下与释放，不得被限定为物理键盘。'
      en: '`key.down` and `key.up` must express press and release of an input channel and must not be limited to physical keyboards.'
  - id: C-EVENT-TYPE-0002-G
    text:
      zh-CN: Adapter 负责解释宿主输入并产生 core event；core event 不得被定义为 DOM `click`、`keydown`、`keyup` 或任一具体宿主事件的别名。
      en: Adapters are responsible for interpreting host input and producing core events; core events must not be defined as aliases for DOM `click`, `keydown`, `keyup`, or any concrete host event.
