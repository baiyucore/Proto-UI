id: C-EXPOSE-0001
type: contract
title: Expose is the component-to-app-maker information channel
status: draft
since: 0.1.0
summary: Expose is the Component-to-App-Maker channel through which a component promises outward values, states, APIs, and signals to its caller.
statement:
  zh-CN: >-
    Expose 是 Proto UI 中 Component → App Maker 方向的信息通路。它允许组件向调用者，也就是 App Maker，传递组件承诺对外提供的信息与能力，包括值、状态、API 与主动广播的 outward signal。这里的调用者不是 User；User 能感知组件依赖 Feedback，而 App Maker 能引用组件能力依赖 Expose。


  en: >-
    Expose is the Component → App Maker information channel in Proto UI. It allows a component to provide its caller, the App Maker, with promised outward information and capabilities, including values, states, APIs, and actively emitted outward signals. The caller is not the User; User perception belongs to Feedback, while App Maker access to component capabilities belongs to Expose.


criteria:
  - id: C-EXPOSE-0001-A
    text:
      zh-CN: Expose 必须被识别为 Component → App Maker 方向的信息通路。
      en: Expose must be identified as the Component → App Maker information channel.
  - id: C-EXPOSE-0001-B
    text:
      zh-CN: Expose 的接收者必须描述为 App Maker 或 caller，不得描述为 User 或使用者。
      en: The receiver of Expose must be described as the App Maker or caller, not as the User.
  - id: C-EXPOSE-0001-C
    text:
      zh-CN: Expose 不得承担 User 可感知反馈；组件向 User 传递可感知结果属于 Feedback。
      en: Expose must not carry User-perceivable feedback; perceivable component output to the User belongs to Feedback.
  - id: C-EXPOSE-0001-D
    text:
      zh-CN: Expose 不得被解释为 App Maker 对组件的参数配置；参数配置属于 Props。
      en: Expose must not be interpreted as App Maker configuration input to the component; configuration input belongs to Props.
  - id: C-EXPOSE-0001-E
    text:
      zh-CN: Expose 可以承载 value、state、method 与 outward signal 等组件对 App Maker 承诺提供的能力。
      en: Expose may carry values, states, methods, outward signals, and similar component capabilities promised to the App Maker.
