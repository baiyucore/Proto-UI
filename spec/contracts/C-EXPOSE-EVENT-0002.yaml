id: C-EXPOSE-EVENT-0002
type: contract
title: Expose event payload semantics remain minimal in v0
status: draft
since: 0.1.0
summary: Expose event payload specs currently provide only minimal payload hints; stronger portable payload guarantees remain open.
statement:
  zh-CN: >-
    Expose event v0 的 payload spec 只提供最小语义提示。`payload?: 'void' | 'any' | 'json'` 能表达组件对 outward signal payload 的基本意图，但尚未完整定义跨宿主 payload value boundary、host-local escape hatch 与 options 行为。除非更具体契约另行规定，adapter 不得从当前 payload spec 推导出比该提示更强的 portable payload 保证。


  en: >-
    Expose event v0 payload specs provide only minimal semantic hints. `payload?: 'void' | 'any' | 'json'` can express the component's basic intent for outward signal payloads, but does not yet fully define cross-host payload value boundaries, host-local escape hatches, or options behavior. Unless a more specific contract says otherwise, adapters must not infer stronger portable payload guarantees from the current payload spec.


criteria:
  - id: C-EXPOSE-EVENT-0002-A
    text:
      zh-CN: "v0 expose event spec 可以包含 `payload?: 'void' | 'any' | 'json'`。"
      en: "v0 expose event specs may contain `payload?: 'void' | 'any' | 'json'`."
  - id: C-EXPOSE-EVENT-0002-B
    text:
      zh-CN: '`payload: "void"` 表达该 outward signal 不应依赖 payload。'
      en: '`payload: "void"` expresses that the outward signal should not depend on a payload.'
  - id: C-EXPOSE-EVENT-0002-C
    text:
      zh-CN: '`payload: "json"` 表达 payload 应遵守 JSON-compatible value 意图，但 v0 尚未把所有 emit payload validation 视为已完成保证。'
      en: '`payload: "json"` expresses an intent for JSON-compatible payloads, but v0 does not yet treat full emit payload validation as an implemented guarantee.'
  - id: C-EXPOSE-EVENT-0002-D
    text:
      zh-CN: '`payload: "any"` 或缺省 payload spec 不得被解释为 portable payload 语义强保证。'
      en: '`payload: "any"` or an omitted payload spec must not be interpreted as a strong portable payload guarantee.'
  - id: C-EXPOSE-EVENT-0002-E
    text:
      zh-CN: '`options` 在 v0 中保留给 adapter 或未来扩展，不得被解释为 portable 行为保证。'
      en: '`options` is reserved in v0 for adapters or future extensions and must not be interpreted as a portable behavior guarantee.'
openQuestions:
  - id: C-EXPOSE-EVENT-0002-Q-PAYLOAD-BOUNDARY
    question:
      zh-CN: expose event payload 是否应强制区分 portable JSON payload 与 host-local payload escape hatch？
      en: Should expose event payloads explicitly distinguish portable JSON payloads from host-local payload escape hatches?
    context:
      zh-CN: outward signal 面向 App Maker，不是 User input；但跨宿主 adapter mapping 仍可能需要比当前 `payload` hint 更强的边界。
      en: Outward signals target the App Maker rather than User input, but cross-host adapter mapping may still need stronger boundaries than the current `payload` hint.
    blocks:
      - expose event payload portability policy
sources:
