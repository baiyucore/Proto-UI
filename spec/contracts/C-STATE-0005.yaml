id: C-STATE-0005
type: contract
title: State mutation does not implicitly render
status: draft
since: 0.1.0
summary: State mutation records a value change without implicitly scheduling render or commit.
statement:
  zh-CN: >-
    State mutation 只负责改变并记录 state value。调用 `set(...)` 不得隐式进入 render、commit 或 update flow；需要让 UI 反映 state 变化时，必须通过显式 update、rule 等已声明机制，或由其他契约定义的路径完成。


  en: >-
    State mutation only changes and records the state value. Calling `set(...)` must not implicitly enter render, commit, or update flow; if UI output needs to reflect a state change, it must do so through explicit update, rule, or another path defined by a separate contract.


criteria:
  - id: C-STATE-0005-A
    text:
      zh-CN: '`set(...)` 不得自动调用 `run.update()` 或任何等价 update entry。'
      en: '`set(...)` must not automatically call `run.update()` or any equivalent update entry.'
  - id: C-STATE-0005-B
    text:
      zh-CN: '`set(...)` 不得自动触发 render 或 commit。'
      en: '`set(...)` must not automatically trigger render or commit.'
  - id: C-STATE-0005-C
    text:
      zh-CN: runtime `created` callback 中发生的 state mutation 必须对首次 render 可见。
      en: State mutation during a runtime `created` callback must be visible to the first render.
  - id: C-STATE-0005-D
    text:
      zh-CN: mounted 之后发生的 state mutation 必须保持已提交输出不变，直到宿主或控制器显式请求 update，或其他声明式机制按自身契约生效。
      en: State mutation after mount must leave committed output unchanged until the host/controller explicitly requests update, or another declarative mechanism applies according to its own contract.
sources:
  - path: internal/contracts/state/state-v0.md
    sections:
      - Relationship to rendering and updates
  - path: packages/runtime/test/contract/state-basic.v0.contract.test.ts
    sections:
      - created set is visible to initial render
      - mounted set does not re-render until explicit update
dependsOn:
  contracts:
    - C-STATE-0001
    - C-LIFECYCLE-0003
revisions:
  - version: 0.1.0
    change: introduced
    summary: Captured no-implicit-render semantics for state mutation.
tags:
  - state
  - render
  - update
