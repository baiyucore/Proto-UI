id: C-EVENT-TYPE-0003
type: contract
title: Optional medium events are conditionally supported semantic events
status: draft
since: 0.1.0
summary: Optional medium events describe interaction-medium semantics that adapters may support, but supported events must obey their semantic contract.
statement:
  zh-CN: >-
    Optional medium event 位于 protocol core event 与 host-bound escape hatch 之间。它们描述 pointer、navigation focus、text focus、input/change 或 context menu 等交互媒介语义，仍然不是具体宿主事件名。Adapter 可以选择不支持某些 optional medium event；但一旦宣称支持，就必须按该 event family 的语义解释和分发。


  en: >-
    Optional medium events sit between protocol core events and host-bound escape hatches. They describe interaction-medium semantics such as pointer, navigation focus, text focus, input/change, or context-menu intent, and are still not concrete host event names. An adapter may choose not to support some optional medium events; however, once it claims support, it must interpret and dispatch them according to that event family's semantics.


criteria:
  - id: C-EVENT-TYPE-0003-A
    text:
      zh-CN: Optional medium event 不得被解释为必须由所有 adapter 支持的 event type。
      en: Optional medium events must not be interpreted as event types that every adapter must support.
  - id: C-EVENT-TYPE-0003-B
    text:
      zh-CN: 若 adapter 支持某个 optional medium event，它必须按该 event family 的语义解释和分发该事件。
      en: If an adapter supports an optional medium event, it must interpret and dispatch that event according to the semantics of its event family.
  - id: C-EVENT-TYPE-0003-C
    text:
      zh-CN: v0 pointer medium event set 包含 `pointer.down`、`pointer.move`、`pointer.up`、`pointer.cancel`、`pointer.enter` 与 `pointer.leave`。
      en: The v0 pointer medium event set includes `pointer.down`, `pointer.move`, `pointer.up`, `pointer.cancel`, `pointer.enter`, and `pointer.leave`.
  - id: C-EVENT-TYPE-0003-D
    text:
      zh-CN: v0 focus/input medium event set 包含 `nav.focus`、`nav.blur`、`text.focus`、`text.blur`、`input`、`change` 与 `context.menu`。
      en: The v0 focus/input medium event set includes `nav.focus`, `nav.blur`, `text.focus`, `text.blur`, `input`, `change`, and `context.menu`.
  - id: C-EVENT-TYPE-0003-E
    text:
      zh-CN: Optional medium event 可以由宿主原生输入直接映射，也可以由 adapter 合成；合成策略属于 adapter 职责。
      en: Optional medium events may be directly mapped from host-native input or synthesized by adapters; synthesis strategy is an adapter responsibility.
