id: C-EVENT-TYPE-0001
type: contract
title: EventTypeV0 is a layered semantic event model
status: draft
since: 0.1.0
summary: Event types are divided into portable core events, optional medium events, and host-bound escape hatches.
statement:
  zh-CN: >-
    `EventTypeV0` 必须被建模为分层的语义事件模型，而不是某个宿主平台的事件名映射表。v0 event type 分为 protocol core event、optional medium event 与 host-bound escape hatch 三层。越靠近 core 的 event type 越应保持跨宿主语义稳定；越靠近 host escape hatch 的 event type 越明确放弃跨宿主语义保证。


  en: >-
    `EventTypeV0` must be modeled as a layered semantic event model, not as an event-name mapping table for a particular host platform. v0 event types are divided into protocol core events, optional medium events, and host-bound escape hatches. Event types closer to the core should preserve stable cross-host semantics; event types closer to host escape hatches explicitly give up cross-host semantic guarantees.


criteria:
  - id: C-EVENT-TYPE-0001-A
    text:
      zh-CN: '`EventTypeV0` 不得被定义为 DOM event、Web event、设备事件或任一具体宿主事件名集合的别名。'
      en: '`EventTypeV0` must not be defined as an alias for DOM events, Web events, device events, or any concrete host event-name set.'
  - id: C-EVENT-TYPE-0001-B
    text:
      zh-CN: '`EventTypeV0` 必须区分 protocol core event、optional medium event 与 host-bound escape hatch。'
      en: '`EventTypeV0` must distinguish protocol core events, optional medium events, and host-bound escape hatches.'
  - id: C-EVENT-TYPE-0001-C
    text:
      zh-CN: protocol core event 承载最高可移植语义；optional medium event 承载条件支持的媒介语义；host-bound escape hatch 放弃跨宿主语义保证。
      en: Protocol core events carry the most portable semantics; optional medium events carry conditionally supported medium semantics; host-bound escape hatches give up cross-host semantic guarantees.
  - id: C-EVENT-TYPE-0001-D
    text:
      zh-CN: Adapter 必须负责把宿主输入系统解释或映射到其支持的 event type 层级；原型作者不得要求某个具体宿主事件直接等同于 protocol core event。
      en: Adapters must be responsible for interpreting or mapping host input systems into the event-type layers they support; prototype authors must not require a concrete host event to be directly equivalent to a protocol core event.
openQuestions:
  - id: C-EVENT-TYPE-0001-Q-VALIDATION
    question:
      zh-CN: 当前 runtime 是否应将 event type 校验收窄到显式 core/optional event 与 host escape hatch？
      en: Should the current runtime narrow event-type validation to explicit core/optional events and host escape hatches?
    context:
      zh-CN: 当前实现接受任意小写点分段 event name；这比 `EventTypeV0` 与本契约草案更宽。
      en: The current implementation accepts arbitrary lowercase dot-separated event names, which is broader than `EventTypeV0` and this contract draft.
    blocks:
      - event type runtime validation
sources:
