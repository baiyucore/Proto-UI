id: C-EXPOSE-0003
type: contract
title: Expose registration is setup-only
status: draft
since: 0.1.0
summary: Expose entries are registered during setup; runtime may use declared expose surfaces but must not mutate the expose registry.
statement:
  zh-CN: >-
    原型作者侧 Expose registration 必须发生在 setup 期间。`def.expose(...)` 与 `def.expose.value/state/method/event(...)` 都是 setup-only declaration API。进入 runtime 后，组件可以使用已声明的 runtime surface，例如 `run.expose.emit(...)`，也可以让已暴露 state handle 反映内部 state 变化，但不得动态新增、删除或替换 expose entry。


  en: >-
    Prototype-author Expose registration must happen during setup. `def.expose(...)` and `def.expose.value/state/method/event(...)` are setup-only declaration APIs. After runtime begins, a component may use already-declared runtime surfaces such as `run.expose.emit(...)`, and exposed state handles may reflect internal state changes, but runtime must not add, remove, or replace expose entries dynamically.


criteria:
  - id: C-EXPOSE-0003-A
    text:
      zh-CN: '`def.expose(key, value)` 必须是 setup-only API。'
      en: '`def.expose(key, value)` must be a setup-only API.'
  - id: C-EXPOSE-0003-B
    text:
      zh-CN: '`def.expose.value`、`def.expose.state`、`def.expose.method` 与 `def.expose.event` 必须继承 setup-only registration 规则。'
      en: '`def.expose.value`, `def.expose.state`, `def.expose.method`, and `def.expose.event` must inherit setup-only registration rules.'
  - id: C-EXPOSE-0003-C
    text:
      zh-CN: setup 结束后调用任何 Expose registration API 必须失败。
      en: Calling any Expose registration API after setup exits must fail.
  - id: C-EXPOSE-0003-D
    text:
      zh-CN: runtime 期间不得动态新增、删除或替换 expose registry 中的 entry。
      en: Runtime must not dynamically add, remove, or replace entries in the expose registry.
  - id: C-EXPOSE-0003-E
    text:
      zh-CN: 已声明 expose surface 的 runtime 行为，例如 emit outward signal 或 exposed state value 变化，不得被解释为重新注册 expose entry。
      en: Runtime behavior of already-declared expose surfaces, such as emitting outward signals or exposed state value changes, must not be interpreted as re-registering expose entries.
