id: C-EVENT-TYPE-0004
type: contract
title: host event types are host-bound escape hatches
status: draft
since: 0.1.0
summary: '`host:*` event types are host-bound escape hatches that keep event lifecycle guarantees but give up portable event semantics.'
statement:
  zh-CN: >-
    `host:*` event type 是 Event 通路中的 host-bound escape hatch。使用 `host:*` 表示原型作者主动放弃该 event type 的跨宿主语义保证，转而依赖 adapter 对当前宿主输入系统的解释或直连。`host:*` 仍然受 Event registration、callback dispatch、lifecycle cleanup 与 target binding 等通用保证约束，但其 payload、命名、触发条件与宿主映射均由 adapter 定义。


  en: >-
    `host:*` event types are host-bound escape hatches in the Event channel. Using `host:*` means the prototype author intentionally gives up cross-host semantic guarantees for that event type and instead depends on the adapter's interpretation of, or direct connection to, the current host input system. `host:*` remains constrained by common Event guarantees such as registration, callback dispatch, lifecycle cleanup, and target binding, but its payload, naming, trigger conditions, and host mapping are adapter-defined.


criteria:
  - id: C-EVENT-TYPE-0004-A
    text:
      zh-CN: Host-bound event escape hatch 的规范前缀应为 `host:`。
      en: The normative prefix for host-bound event escape hatches should be `host:`.
  - id: C-EVENT-TYPE-0004-B
    text:
      zh-CN: '`host:*` event type 不承诺跨宿主语义一致性。'
      en: '`host:*` event types do not promise cross-host semantic consistency.'
  - id: C-EVENT-TYPE-0004-C
    text:
      zh-CN: '`host:*` event type 仍必须遵守 Event 的 setup-time registration、runtime callback dispatch、lifecycle cleanup 与 target binding 规则。'
      en: '`host:*` event types must still obey Event rules for setup-time registration, runtime callback dispatch, lifecycle cleanup, and target binding.'
  - id: C-EVENT-TYPE-0004-D
    text:
      zh-CN: '`host:*` 的 payload、命名、触发条件与具体宿主映射由 adapter 定义，不属于 portable Event semantics。'
      en: The payload, naming, trigger conditions, and concrete host mapping of `host:*` are adapter-defined and outside portable Event semantics.
  - id: C-EVENT-TYPE-0004-E
    text:
      zh-CN: 原型作者依赖 `host:*` 会降低原型可移植性；工具链与文档应能将其标识为 escape hatch。
      en: Depending on `host:*` reduces prototype portability; tooling and documentation should be able to identify it as an escape hatch.
