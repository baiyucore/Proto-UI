id: C-EXPOSE-0008
type: contract
title: Expose entries are bound to instance lifecycle
status: draft
since: 0.1.0
summary: Expose entries are valid only while the component instance remains under runtime responsibility and must be cleared or invalidated after dispose.
statement:
  zh-CN: >-
    Expose entries 绑定到组件实例生命周期。实例存活期间，App Maker 可以通过 adapter 提供的方式访问该实例已声明的 exposes。实例 unmount/dispose 后，exposes 必须被清理、失效，或以可区分方式表示不可用；残留旧 record 不得继续表现为当前有效组件能力。


  en: >-
    Expose entries are bound to the component instance lifecycle. While the instance is alive, the App Maker may access the instance's declared exposes through adapter-provided surfaces. After unmount/dispose, exposes must be cleared, invalidated, or made distinguishably unavailable; leftover old records must not continue to present themselves as currently valid component capabilities.


criteria:
  - id: C-EXPOSE-0008-A
    text:
      zh-CN: 实例存活期间，已注册 expose entry 必须按 adapter surface 对 App Maker 可访问。
      en: While the instance is alive, registered expose entries must be accessible to the App Maker through adapter surfaces.
  - id: C-EXPOSE-0008-B
    text:
      zh-CN: 实例 unmount/dispose 后，exposes 必须被清理、失效，或以可区分方式表示不可用。
      en: After instance unmount/dispose, exposes must be cleared, invalidated, or made distinguishably unavailable.
  - id: C-EXPOSE-0008-C
    text:
      zh-CN: dispose 后读取 expose registry 的 internal port 必须失败或返回明确清理后的状态；不得继续返回旧的有效 registry。
      en: After dispose, internal reads of the expose registry must fail or return a clearly cleared state; they must not continue returning the old valid registry.
  - id: C-EXPOSE-0008-D
    text:
      zh-CN: adapter 暴露给 App Maker 的旧 snapshot 或宿主引用若仍可被持有，不得被解释为当前 live instance expose registry。
      en: Old snapshots or host references held by the App Maker after disposal must not be interpreted as the current live instance expose registry.
  - id: C-EXPOSE-0008-E
    text:
      zh-CN: 更具体 expose surface，例如 expose-state subscription 或 expose-event emit，必须继承 instance lifecycle safety。
      en: More specific expose surfaces, such as expose-state subscriptions or expose-event emission, must inherit instance lifecycle safety.
