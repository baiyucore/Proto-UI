id: C-EVENT-0005
type: contract
title: Event registrations are unique and not deduplicated
status: draft
since: 0.1.0
summary: Each event registration call creates a distinct listener registration, even when type, callback, and options are identical.
statement:
  zh-CN: >-
    Event registration 必须按调用次数建模。每一次 `def.event.on(...)` 或 `def.event.onGlobal(...)` 调用都必须创建新的独立 registration；即使 event type、callback 与 options 完全相同，也不得被去重、合并或覆盖。多个相同 registration 在匹配事件发生时代表多个独立 callback delivery。


  en: >-
    Event registration must be modeled by call count. Each call to `def.event.on(...)` or `def.event.onGlobal(...)` must create a new independent registration; even if the event type, callback, and options are identical, registrations must not be deduplicated, merged, or overwritten. Multiple identical registrations represent multiple independent callback deliveries when a matching event occurs.


criteria:
  - id: C-EVENT-0005-A
    text:
      zh-CN: 每次 `def.event.on(...)` 调用必须创建新的 root-scoped registration。
      en: Each `def.event.on(...)` call must create a new root-scoped registration.
  - id: C-EVENT-0005-B
    text:
      zh-CN: 每次 `def.event.onGlobal(...)` 调用必须创建新的 global-scoped registration。
      en: Each `def.event.onGlobal(...)` call must create a new global-scoped registration.
  - id: C-EVENT-0005-C
    text:
      zh-CN: 相同 type、callback 与 options 的 registration 不得被去重、合并或覆盖。
      en: Registrations with identical type, callback, and options must not be deduplicated, merged, or overwritten.
  - id: C-EVENT-0005-D
    text:
      zh-CN: 多个相同 registration 必须在匹配事件发生时表现为多个独立 callback delivery。
      en: Multiple identical registrations must behave as multiple independent callback deliveries when a matching event occurs.
sources:
