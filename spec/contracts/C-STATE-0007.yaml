id: C-STATE-0007
type: contract
title: Owned state view represents direct prototype ownership
status: draft
since: 0.1.0
summary: An owned state view is returned for state directly created and fully controlled by the current prototype, and deliberately does not expose `watch`.
statement:
  zh-CN: >-
    Owned state view 表示该 state 由当前原型创建，并且完全、直接受当前原型控制。owned view 可以读取、设置默认值与在 runtime 设置当前值，但不得暴露 `watch`；这是为了避免原型作者把自己完全控制的状态变化建模成监听副作用。


  en: >-
    An owned state view means the state was created by the current prototype and is fully and directly controlled by it. The owned view may read, set defaults, and set the current value during runtime, but must not expose `watch`; this intentionally discourages modeling fully self-controlled state changes as listener side effects.


criteria:
  - id: C-STATE-0007-A
    text:
      zh-CN: 当前原型通过 `def.state.*` 直接创建并完全控制的 state 必须以 owned view 返回。
      en: State directly created and fully controlled by the current prototype through `def.state.*` must be returned as an owned view.
  - id: C-STATE-0007-B
    text:
      zh-CN: Owned view 必须提供 `get()`。
      en: Owned views must provide `get()`.
  - id: C-STATE-0007-C
    text:
      zh-CN: Owned view 必须提供 setup-only `setDefault(...)`。
      en: Owned views must provide setup-only `setDefault(...)`.
  - id: C-STATE-0007-D
    text:
      zh-CN: Owned view 必须提供 runtime-only `set(...)`。
      en: Owned views must provide runtime-only `set(...)`.
  - id: C-STATE-0007-E
    text:
      zh-CN: Owned view 不得提供 prototype-author-facing `watch(...)`。
      en: Owned views must not provide prototype-author-facing `watch(...)`.
sources:
