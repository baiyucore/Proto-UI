id: C-STATE-0003
type: contract
title: State slot is accessed through capability views
status: draft
since: 0.1.0
summary: Prototype authors and App Makers do not receive the raw state source; they receive capability views over the state slot.
statement:
  zh-CN: >-
    State slot 是一个状态机式的数据源，但它不会被直接交给原型作者或 App Maker。原型作者拿到的是 state slot 的能力视图：owned、borrowed 或 observed；App Maker 若通过 expose 获得 state，也只能获得翻译层定义的特制外部视图。


  en: >-
    A state slot is a state-machine-like data source, but it is not handed directly to prototype authors or App Makers. Prototype authors receive capability views over the slot: owned, borrowed, or observed; when App Makers receive state through expose, they receive a translation-layer-defined external view.


criteria:
  - id: C-STATE-0003-A
    text:
      zh-CN: 原型作者不得获得裸 state slot 或裸数据源，只能获得受控 state view。
      en: Prototype authors must not receive the raw state slot or raw data source; they may only receive controlled state views.
  - id: C-STATE-0003-B
    text:
      zh-CN: 原型作者侧 state view 必须至少区分 owned、borrowed 与 observed 三种能力视图。
      en: Prototype-author-side state views must distinguish at least owned, borrowed, and observed capability views.
  - id: C-STATE-0003-C
    text:
      zh-CN: State view 的能力集合必须由 view 类型决定，且不得在 runtime 动态升级为更高权限 view。
      en: A state view's capability set must be determined by the view type and must not be dynamically escalated at runtime into a higher-privilege view.
  - id: C-STATE-0003-D
    text:
      zh-CN: App Maker 通过 expose 获得的 state 不得被解释为原型作者侧 owned、borrowed 或 observed view；其 API 形状由翻译层或 expose-state 契约定义。
      en: State obtained by an App Maker through expose must not be interpreted as a prototype-author-side owned, borrowed, or observed view; its API shape is defined by the translation layer or expose-state contracts.
sources:
