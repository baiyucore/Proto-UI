id: C-STATE-0006
type: contract
title: State definitions use finite host-neutral value specs
status: draft
since: 0.1.0
summary: State definition APIs admit a finite set of host-neutral state kinds whose values remain within JSON-compatible domains.
statement:
  zh-CN: >-
    State definition 只承认有限的 host-neutral state kind，并且这些 kind 的值域必须保持在 JSON-compatible value 边界内。每种定义 API 都有独立的形状要求，例如 enum 必须声明 `options`，number range 必须声明 `min` 与 `max`。


  en: >-
    State definition admits only a finite set of host-neutral state kinds, and the value domain of those kinds must remain within JSON-compatible value boundaries. Each definition API has its own shape requirements, such as enum requiring `options` and number range requiring `min` and `max`.


criteria:
  - id: C-STATE-0006-A
    text:
      zh-CN: v0 承认的 state kind 必须限定为 `bool`、`enum`、`string`、`number.range` 与 `number.discrete`。
      en: The v0 admitted state kinds must be limited to `bool`, `enum`, `string`, `number.range`, and `number.discrete`.
  - id: C-STATE-0006-B
    text:
      zh-CN: State value 必须满足 JSON-compatible value 边界，不得要求 function、symbol、class instance、host object 或其他非 portable 值。
      en: State values must satisfy JSON-compatible value boundaries and must not require functions, symbols, class instances, host objects, or other non-portable values.
  - id: C-STATE-0006-C
    text:
      zh-CN: '`def.state.enum(semantic, defaultValue, spec)` 的 `spec.options` 必须存在，并定义允许的 string literal 集合。'
      en: '`def.state.enum(semantic, defaultValue, spec)` must include `spec.options`, which defines the allowed string literal set.'
  - id: C-STATE-0006-D
    text:
      zh-CN: '`def.state.numberRange(semantic, defaultValue, spec)` 的 `spec.min` 与 `spec.max` 必须存在，并定义连续数字范围。'
      en: '`def.state.numberRange(semantic, defaultValue, spec)` must include `spec.min` and `spec.max`, defining the continuous numeric range.'
  - id: C-STATE-0006-E
    text:
      zh-CN: '`def.state.string(...)` 与 `def.state.numberDiscrete(...)` 可以通过 options、min、max、step 等 metadata 进一步描述值域；这些 metadata 仍必须保持 host-neutral。'
      en: '`def.state.string(...)` and `def.state.numberDiscrete(...)` may further describe their value domains through metadata such as options, min, max, and step; that metadata must remain host-neutral.'
openQuestions:
  - id: C-STATE-0006-Q-VALIDATION
    question:
      zh-CN: v0 是否应强制所有 state definition、`setDefault` 与 `set` 调用执行 value-domain validation？
      en: Should v0 require value-domain validation for every state definition, `setDefault`, and `set` call?
    context:
      zh-CN: 当前存在 validator helper，但尚未完整接入 state module；先将其作为 debt 记录，不把运行时校验当作已完成保证。
      en: Validator helpers exist today, but they are not fully wired into the state module; this remains recorded as debt rather than treated as an implemented runtime guarantee.
    blocks:
      - state value validation implementation
sources:
  - path: internal/contracts/state/state-v0.md
    sections:
