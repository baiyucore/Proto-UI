id: C-STATE-0008
type: contract
title: Borrowed state view represents shared control
status: draft
since: 0.1.0
summary: A borrowed state view represents a state that is not directly created by the current prototype but may still be controlled by it.
statement:
  zh-CN: >-
    Borrowed state view 表示该 state 不直接由当前原型创建，或不完全受当前原型控制，但当前原型仍被授权操纵它、更新它并观察它。borrowed view 适用于 asHook state、官方交互语义 state 等“可控制但不完全拥有”的状态。


  en: >-
    A borrowed state view means the state is not directly created by the current prototype, or is not fully controlled by it, but the current prototype is still authorized to manipulate, update, and observe it. Borrowed views fit states that are controllable but not fully owned, such as asHook state and official interaction semantic state.


criteria:
  - id: C-STATE-0008-A
    text:
      zh-CN: 当前原型可控制但不完全拥有的 state 必须使用 borrowed view。
      en: State that the current prototype can control but does not fully own must use a borrowed view.
  - id: C-STATE-0008-B
    text:
      zh-CN: Borrowed view 必须提供 `get()`。
      en: Borrowed views must provide `get()`.
  - id: C-STATE-0008-C
    text:
      zh-CN: Borrowed view 必须提供 setup-only `setDefault(...)`，用于表达当前原型对该 state 的默认值控制权。
      en: Borrowed views must provide setup-only `setDefault(...)`, expressing the current prototype's default-value control over that state.
  - id: C-STATE-0008-D
    text:
      zh-CN: Borrowed view 必须提供 runtime-only `set(...)`。
      en: Borrowed views must provide runtime-only `set(...)`.
  - id: C-STATE-0008-E
    text:
      zh-CN: Borrowed view 必须提供 setup-only `watch(...)`。
      en: Borrowed views must provide setup-only `watch(...)`.
