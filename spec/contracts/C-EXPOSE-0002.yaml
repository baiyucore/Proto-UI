id: C-EXPOSE-0002
type: contract
title: Expose declares outward capability promises
status: draft
since: 0.1.0
summary: Expose declarations describe the outward capability surface a component promises to provide to the App Maker.
statement:
  zh-CN: >-
    Expose 声明不是一次 runtime 输出，也不是 render output。它是在 setup 期间声明组件实例会向 App Maker 提供的 outward capability surface。App Maker 通过 adapter 提供的承载方式读取或调用这些承诺，但 Expose map 本身在 v0 不被建模为 reactive data channel。


  en: >-
    Expose declarations are not one-time runtime outputs and are not render output. They declare, during setup, the outward capability surface that a component instance promises to provide to the App Maker. The App Maker reads or invokes those promises through adapter-provided host surfaces, but the Expose map itself is not modeled as a reactive data channel in v0.


criteria:
  - id: C-EXPOSE-0002-A
    text:
      zh-CN: Expose declaration 必须描述组件承诺提供的 outward capability surface，而不是本次 render 的输出结构。
      en: Expose declarations must describe the outward capability surface promised by the component, not the output structure of the current render.
  - id: C-EXPOSE-0002-B
    text:
      zh-CN: Expose declaration 不得被解释为一次 runtime 写入或一次性消息发送；runtime 发送 outward signal 必须通过已声明的 emit surface。
      en: Expose declarations must not be interpreted as runtime writes or one-off message sends; runtime outward signals must go through a declared emit surface.
  - id: C-EXPOSE-0002-C
    text:
      zh-CN: v0 不要求 Expose map 自身具备 automatic subscription、dependency tracking 或 runtime mutation 语义。
      en: v0 must not require the Expose map itself to provide automatic subscription, dependency tracking, or runtime mutation semantics.
  - id: C-EXPOSE-0002-D
    text:
      zh-CN: 需要变化通知时，组件应暴露 state handle、outward signal，或显式暴露具备订阅语义的 API。
      en: When change notification is needed, a component should expose a state handle, an outward signal, or an explicitly subscription-capable API.
