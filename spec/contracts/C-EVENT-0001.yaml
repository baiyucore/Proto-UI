  - path: apps/www/src/content/docs/en/whitepaper/information-flow-model.md
    sections:
      - User ↔ Component
refines:
  contracts:
    - id: C-CORE-CHANNEL-0001
      anchors:
        - C-CORE-CHANNEL-0001-A
        - C-CORE-CHANNEL-0001-C
      note: Event is the User-to-Component interaction-input channel currently admitted into Proto UI's portable channel model.
dependsOn:
  knowledge:
    - K-INFORMATION-CHANNEL-0001
revisions:
  - version: 0.1.0
    change: introduced
    summary: Captured the top-level channel identity for event.
tags:
