id: C-STATE-0001
type: contract
title: State is the host-neutral internal state expression
status: draft
since: 0.1.0
summary: State defines, stores, and records component-internal state changes without being an information channel or a side-effect mechanism.
statement:
  zh-CN: >-
    State 是 Proto UI 提供的 host-neutral 内部状态表达方式。它用于定义、存储并记录 Component 内部状态随时间发生的变化；它不是信息通路，也不得隐式触发 render、commit、feedback flush 或其他副作用。


  en: >-
    State is Proto UI's host-neutral expression for internal component state. It defines, stores, and records changes to a Component's internal state over time; it is not an information channel and must not implicitly trigger render, commit, feedback flush, or other side effects.


criteria:
  - id: C-STATE-0001-A
    text:
      zh-CN: State 必须被识别为 Component 的内部维度，而不是 User、App Maker、Other Component 或 host/environment 之间的信息通路。
      en: State must be identified as an internal Component dimension, not as an information channel between User, App Maker, Other Component, or host/environment.
  - id: C-STATE-0001-B
    text:
      zh-CN: State 必须用于表达组件在时间中的内部连续性，包括状态定义、状态存储与状态变化记录。
      en: State must express a component's internal continuity over time, including state definition, state storage, and state-change records.
  - id: C-STATE-0001-C
    text:
      zh-CN: State API 自身不得隐式触发 render、commit、feedback flush 或其他宿主副作用。
      en: State APIs themselves must not implicitly trigger render, commit, feedback flush, or other host side effects.
sources:
  - path: internal/contracts/state/state-v0.md
    sections:
      - Positioning statement
      - Relationship to rendering and updates
  - path: apps/www/src/content/docs/zh-cn/whitepaper/information-flow-model.md
    sections:
      - 信息通路并不等于组件的全部
  - path: apps/www/src/content/docs/en/whitepaper/information-flow-model.md
    sections:
      - Information flows are not the whole component
dependsOn:
  knowledge:
    - K-INFORMATION-CHANNEL-0001
refines:
  contracts:
    - id: C-CORE-CHANNEL-0001
      note: State is explicitly outside the portable information-channel set governed by the information flow model.
revisions:
  - version: 0.1.0
    change: introduced
    summary: Captured State as a host-neutral internal state expression rather than an information channel.
tags:
  - state
  - internal
  - host-neutral
