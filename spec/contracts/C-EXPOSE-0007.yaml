id: C-EXPOSE-0007
type: contract
title: Expose method represents an App-Maker-callable capability
status: draft
since: 0.1.0
summary: Expose method declares that a component provides an outward capability the App Maker may invoke through an adapter-defined calling surface.
statement:
  zh-CN: >-
    `def.expose.method(key, fn)` 表示组件承诺向 App Maker 提供一个可调用能力，例如 `focus()`、`reset()` 或 `open()`。直接函数引用只是 JavaScript/Web 宿主中自然的承载方式；哲学层契约只要求 App Maker 能触发该能力，不要求所有宿主都以直接函数调用实现。


  en: >-
    `def.expose.method(key, fn)` means the component promises an App-Maker-callable capability such as `focus()`, `reset()`, or `open()`. A direct function reference is only the natural carrier in JavaScript/Web hosts; the philosophical contract only requires the App Maker to be able to trigger the capability, not that every host implements it as a direct function call.


criteria:
  - id: C-EXPOSE-0007-A
    text:
      zh-CN: expose method 必须表示 App Maker 可以触发的组件 outward capability。
      en: Expose methods must represent component outward capabilities triggerable by the App Maker.
  - id: C-EXPOSE-0007-B
    text:
      zh-CN: expose method 适合命令式能力，例如 focus、reset、open、close 或其他组件主动行为。
      en: Expose methods fit imperative capabilities such as focus, reset, open, close, or other component actions.
  - id: C-EXPOSE-0007-C
    text:
      zh-CN: 直接函数调用不得被解释为所有宿主必须采用的唯一 method 实现方式。
      en: Direct function invocation must not be interpreted as the only method implementation shape required for every host.
  - id: C-EXPOSE-0007-D
    text:
      zh-CN: adapter 可以将 expose method 翻译为直接函数、ref method、message invocation 或其他宿主适合的调用表面，但不得改变该 method 的组件能力语义。
      en: Adapters may translate expose methods into direct functions, ref methods, message invocation, or other host-appropriate calling surfaces, but must not change the component capability semantics of the method.
  - id: C-EXPOSE-0007-E
    text:
      zh-CN: expose method 不得被解释为 Event 通路 callback，也不得被解释为 Feedback。
      en: Expose methods must not be interpreted as Event-channel callbacks or as Feedback.
openQuestions:
  - id: C-EXPOSE-0007-Q-CALL-SHAPE
    question:
      zh-CN: expose method 的 portable 调用模型是否应从直接函数引用抽象为 message invocation？
      en: Should the portable call model for expose methods be abstracted from direct function references into message invocation?
    context:
      zh-CN: 直接函数引用对 JavaScript/Web 很自然，但跨平台可能不足。若引入 message invocation，需要决定是在原型作者 API 层体现，还是由翻译层负责。
      en: Direct function references are natural for JavaScript/Web, but may not be sufficiently cross-platform. If message invocation is introduced, Proto UI must decide whether it appears in the prototype-author API or is handled by the translation layer.
    blocks:
      - expose method portable invocation model
