id: C-EVENT-0004
type: contract
title: Empty event registration is a binding no-op
status: draft
since: 0.1.0
summary: Binding event listeners with no registrations must be a no-op and must not require root or global targets.
statement:
  zh-CN: >-
    Event binding 必须按实际 registration 需求读取 target。若当前组件实例没有任何 event registration，binding step 必须是 no-op，不得读取 root target 或 global target，也不得因为 target 缺失而失败。只有存在 root-scoped registration 时才要求 root target 可用；只有存在 global-scoped registration 时才要求 global target 可用。


  en: >-
    Event binding must read targets according to actual registration needs. If the current component instance has no event registrations, the binding step must be a no-op, must not read the root target or global target, and must not fail because targets are unavailable. A root target is required only when root-scoped registrations exist; a global target is required only when global-scoped registrations exist.


criteria:
  - id: C-EVENT-0004-A
    text:
      zh-CN: 没有任何 event registration 时，event binding step 必须是 no-op。
      en: When there are no event registrations, the event binding step must be a no-op.
  - id: C-EVENT-0004-B
    text:
      zh-CN: 没有任何 event registration 时，event binding step 不得读取 root target 或 global target。
      en: When there are no event registrations, the event binding step must not read the root target or global target.
  - id: C-EVENT-0004-C
    text:
      zh-CN: 没有任何 event registration 时，event binding step 不得因为 root/global target 缺失而抛错。
      en: When there are no event registrations, the event binding step must not throw because root/global targets are unavailable.
  - id: C-EVENT-0004-D
    text:
      zh-CN: 只有至少存在一个 root-scoped registration 时，binding step 才能要求 root target 可用。
      en: The binding step may require the root target only when at least one root-scoped registration exists.
  - id: C-EVENT-0004-E
    text:
      zh-CN: 只有至少存在一个 global-scoped registration 时，binding step 才能要求 global target 可用。
      en: The binding step may require the global target only when at least one global-scoped registration exists.
sources:
  - path: internal/contracts/event/event.v0.md
    sections:
      - Binding Time and the “No Registrations” Rule
  - path: packages/modules/event/test/contract/event-module.v0.contract.test.ts
