id: C-EVENT-0003
type: contract
title: Event registrations bind to root and global interaction targets
status: draft
since: 0.1.0
summary: '`def.event.on` binds to the component root interaction target, while `def.event.onGlobal` binds to an adapter-defined global interaction target.'
statement:
  zh-CN: >-
    Event registration 必须绑定到 adapter 提供的 interaction target。`def.event.on(...)` 创建 root-scoped registration，默认绑定到当前组件实例的 root interaction target；`def.event.onGlobal(...)` 创建 global-scoped registration，绑定到 adapter-defined global interaction target。原型作者不得通过 Event API 选择、读取或依赖具体宿主对象，例如 Web 的 `window`、`document` 或 DOM node。


  en: >-
    Event registrations must bind to interaction targets supplied by the adapter. `def.event.on(...)` creates a root-scoped registration bound by default to the current component instance's root interaction target; `def.event.onGlobal(...)` creates a global-scoped registration bound to an adapter-defined global interaction target. Prototype authors must not use the Event API to choose, read, or depend on concrete host objects such as Web `window`, `document`, or DOM nodes.


criteria:
  - id: C-EVENT-0003-A
    text:
      zh-CN: '`def.event.on(...)` 创建的 registration 必须默认绑定到当前组件实例的 root interaction target。'
      en: Registrations created by `def.event.on(...)` must bind by default to the current component instance's root interaction target.
  - id: C-EVENT-0003-B
    text:
      zh-CN: '`def.event.onGlobal(...)` 创建的 registration 必须绑定到 adapter-defined global interaction target。'
      en: Registrations created by `def.event.onGlobal(...)` must bind to an adapter-defined global interaction target.
  - id: C-EVENT-0003-C
    text:
      zh-CN: Event facade 不得向原型作者暴露具体 root/global target 对象，也不得允许原型作者选择具体 global target。
      en: The Event facade must not expose concrete root/global target objects to prototype authors or allow prototype authors to choose the concrete global target.
  - id: C-EVENT-0003-D
    text:
      zh-CN: root/global target 的宿主映射与替换策略属于 runtime/adapter 职责，不属于原型作者 API。
      en: Host mapping and replacement strategy for root/global targets are runtime/adapter responsibilities, not prototype-author APIs.
