id: C-STATE-INTERACTION-0002
type: contract
title: Interaction state declaration introduces runtime-managed interaction wiring
status: draft
since: 0.1.0
summary: Declaring interaction state may implicitly introduce event subscriptions and host interaction wiring managed by Proto UI runtime modules and adapters.
statement:
  zh-CN: >-
    Interaction state 是 State 与 Event 复合后最终归入 State 的子领域。声明 interaction state 表示原型作者请求某类交互事实的 state-shaped 语义入口；该声明可以隐式引入 event 订阅、adapter interaction mapping 与必要的 host capability 协作，但这些 wiring 必须由 Proto UI runtime package、module 体系、adapter 与 host cap 共同管理，而不是暴露为原型作者手写的 event subscription。


  en: >-
    Interaction state is a State subdomain produced by composing State with Event and ultimately surfaced through State. Declaring interaction state means the prototype author requests a state-shaped semantic entry point for an interaction fact; that declaration may implicitly introduce event subscriptions, adapter interaction mapping, and required host-capability collaboration, but this wiring must be managed by the Proto UI runtime package, module system, adapters, and host caps rather than exposed as prototype-author-written event subscriptions.


criteria:
  - id: C-STATE-INTERACTION-0002-A
    text:
      zh-CN: '`def.state.fromInteraction(name)` 声明必须允许 runtime/module/adapter 层为该 interaction state 建立必要的 event subscription 或 host interaction wiring。'
      en: '`def.state.fromInteraction(name)` declarations must allow the runtime/module/adapter layer to establish the event subscriptions or host interaction wiring required for that interaction state.'
  - id: C-STATE-INTERACTION-0002-B
    text:
      zh-CN: 由 interaction state 声明引入的 event subscription 必须由 Proto UI runtime package 与 module 体系管理生命周期，不得要求原型作者手动注册或清理这些订阅。
      en: Event subscriptions introduced by interaction state declarations must be lifecycle-managed by the Proto UI runtime package and module system, and must not require prototype authors to manually register or clean up those subscriptions.
  - id: C-STATE-INTERACTION-0002-C
    text:
      zh-CN: adapter 可以通过 host event、host capability 或其他 host-specific 机制维护 interaction state，但最终必须表现为官方 state-shaped semantic input。
      en: Adapters may maintain interaction state through host events, host capabilities, or other host-specific mechanisms, but the result must surface as official state-shaped semantic input.
  - id: C-STATE-INTERACTION-0002-D
    text:
      zh-CN: interaction state 的 event-backed wiring 不得被解释为原型作者侧 Event runtime API；原型作者仍只通过 State view 使用该能力。
      en: Event-backed wiring for interaction state must not be interpreted as a prototype-author-facing Event runtime API; prototype authors still consume the capability through State views.
  - id: C-STATE-INTERACTION-0002-E
    text:
      zh-CN: interaction state 的声明与维护不得隐式触发 render 或 commit；UI 更新仍必须通过显式 update、rule 或其他独立契约定义的路径发生。
      en: Declaring and maintaining interaction state must not implicitly trigger render or commit; UI updates must still occur through explicit update, rule, or another path defined by a separate contract.
  - id: C-STATE-INTERACTION-0002-F
    text:
      zh-CN: 同一交互主体的 `disabled` interaction state 为 true 时，runtime-managed wiring 不得把 hovered、pressed、focused 或 focusVisible 激活为 true，并必须清理已经激活的这些瞬时 interaction state。
      en: When the same interaction subject's `disabled` interaction state is true, runtime-managed wiring must not activate hovered, pressed, focused, or focusVisible to true and must clear any already-active transient interaction states among them.
openQuestions:
  - id: C-STATE-INTERACTION-0002-Q-MODULE-HOST-CAP-CATALOG
    question:
      zh-CN: Module 与 Host cap 实体编目完成后，state-interaction 对 event target capability 与 adapter interaction mapping 的约束应如何被拆到更底层契约？
      en: Once Module and Host cap entities are cataloged, how should state-interaction constraints on event target capabilities and adapter interaction mapping be split into lower-level contracts?
    context:
      zh-CN: 当前实现已通过 `@proto.ui/module-state-interaction` 对 `@proto.ui/module-event` 的依赖，确保 interaction state 不自行索要 host event capability；但 Module 与 Host cap 本身仍待系统编目。
      en: The current implementation now uses the `@proto.ui/module-state-interaction` dependency on `@proto.ui/module-event` so interaction state does not request host event capabilities directly; Module and Host cap entities still need systematic cataloging.
    blocks:
      - module catalog
      - host capability catalog
