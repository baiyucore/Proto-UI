id: C-EVENT-0002
type: contract
title: Event defines setup-time listener registration and runtime callback dispatch
status: draft
since: 0.1.0
summary: '`def.event` registers listeners during setup; Event currently exposes no prototype-author runtime API, while registered callbacks are dispatched during runtime callback execution.'
statement:
  zh-CN: >-
    Event API 必须区分 setup-time listener registration 与 runtime callback dispatch。原型作者通过 `def.event.on(type, cb, options?)`、`def.event.onGlobal(type, cb, options?)` 与 `def.event.off(token)` 在 setup 阶段声明或移除 listener registration；进入 runtime 后，Event 通路当前不提供 prototype-author runtime API。被注册的 callback 只能在 runtime callback phase 被调用，并必须接收绑定当前 callback invocation 的 `run handle` 与 event payload。


  en: >-
    The Event API must separate setup-time listener registration from runtime callback dispatch. Prototype authors declare or remove listener registrations during setup through `def.event.on(type, cb, options?)`, `def.event.onGlobal(type, cb, options?)`, and `def.event.off(token)`; after runtime begins, the Event channel currently exposes no prototype-author runtime API. Registered callbacks may only be invoked during the runtime callback phase and must receive the `run handle` bound to the current callback invocation and the event payload.


criteria:
  - id: C-EVENT-0002-A
    text:
      zh-CN: '`def.event.on(type, cb, options?)` 与 `def.event.onGlobal(type, cb, options?)` 必须是 setup-only listener registration API。'
      en: '`def.event.on(type, cb, options?)` and `def.event.onGlobal(type, cb, options?)` must be setup-only listener-registration APIs.'
  - id: C-EVENT-0002-B
    text:
      zh-CN: '`def.event.off(token)` 必须是 setup-only listener removal API；它不得被解释为 runtime 动态订阅或取消订阅能力。'
      en: '`def.event.off(token)` must be a setup-only listener-removal API; it must not be interpreted as a runtime dynamic-subscription or unsubscription capability.'
  - id: C-EVENT-0002-C
    text:
      zh-CN: setup 结束后调用 `def.event.on`、`def.event.onGlobal` 或 `def.event.off` 必须失败。
      en: Calling `def.event.on`, `def.event.onGlobal`, or `def.event.off` after setup exits must fail.
  - id: C-EVENT-0002-D
    text:
      zh-CN: Event registration API 不得在注册时立即执行 callback；callback 只能由 runtime event dispatch 调用。
      en: Event registration APIs must not invoke callbacks during registration; callbacks may only be invoked by runtime event dispatch.
  - id: C-EVENT-0002-E
    text:
      zh-CN: Event callback 的 portable 签名必须是 `cb(run, ev) => void`，其中 `run` 是当前 callback invocation 绑定的 runtime handle，`ev` 是 event payload。
      en: The portable Event callback signature must be `cb(run, ev) => void`, where `run` is the runtime handle bound to the current callback invocation and `ev` is the event payload.
  - id: C-EVENT-0002-F
    text:
      zh-CN: Event module 不得被要求理解、构造或校验 `run handle`；将正确的 `run handle` 绑定到 event callback invocation 是 runtime 的职责。
      en: The Event module must not be required to understand, construct, or validate `run handles`; binding the correct `run handle` to an event callback invocation is the runtime's responsibility.
  - id: C-EVENT-0002-G
    text:
      zh-CN: Event 通路当前不得固化任何 prototype-author runtime API；主动触发 event、runtime 动态订阅或 runtime 取消订阅等能力若未来提供，必须作为独立 escape hatch 另行设计。
      en: The Event channel currently must not stabilize any prototype-author runtime API; if active event triggering, runtime dynamic subscription, or runtime unsubscription is provided in the future, it must be designed separately as an escape hatch.
  - id: C-EVENT-0002-H
    text:
      zh-CN: '`run.expose.emit` 不得被本契约解释为 Event 通路 runtime API；它属于 expose-event emission surface。'
      en: '`run.expose.emit` must not be interpreted by this contract as an Event-channel runtime API; it belongs to the expose-event emission surface.'
  - id: C-EVENT-0002-I
    text:
      zh-CN: portable Event payload 必须至少暴露产生该 callback dispatch 的 portable event type。
      en: Portable Event payloads must expose at least the portable event type that produced the callback dispatch.
  - id: C-EVENT-0002-J
    text:
      zh-CN: '`key.*` event payload 必须暴露 portable `key` string。'
      en: '`key.*` event payloads must expose a portable `key` string.'
  - id: C-EVENT-0002-K
    text:
      zh-CN: 宿主原生事件对象、具体 target 与宿主控制方法可以作为 host-local escape hatch 暴露，但不得被解释为 portable payload 保证。
      en: Native host event objects, concrete targets, and host control methods may be exposed as host-local escape hatches, but must not be interpreted as portable payload guarantees.
openQuestions:
  - id: C-EVENT-0002-Q-RUNTIME-ESCAPE-HATCH
    question:
      zh-CN: Event 是否需要 future runtime escape hatch，例如主动触发某个 event、runtime 动态添加订阅或 runtime 取消订阅？
      en: Does Event need future runtime escape hatches, such as actively triggering an event, dynamically adding subscriptions at runtime, or unsubscribing at runtime?
    context:
      zh-CN: 当前 Event 通路只固化 setup listener registration 与 runtime callback dispatch。runtime escape hatch 可能有用，但不应混入 v0 的核心 Event API。
      en: The current Event channel only stabilizes setup listener registration and runtime callback dispatch. Runtime escape hatches may be useful, but should not be mixed into the v0 core Event API.
    blocks:
      - event runtime escape hatch design
