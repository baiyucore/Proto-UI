id: C-STATE-0011
type: contract
title: StateEvent records value changes and disconnects
status: draft
since: 0.1.0
summary: State watchers receive `next` events for value transitions and `disconnect` events for lifecycle disconnection.
statement:
  zh-CN: >-
    StateEvent 是 state 变化记录的 portable event shape。state value 发生实际变化时，watcher 接收 `next` event，包含 `prev`、`next` 与可选 `reason`；state slot 与 watcher 因 lifecycle 断开时，watcher 可以接收 `disconnect` event。StateEvent 不携带 render 调度语义。


  en: >-
    StateEvent is the portable event shape for state-change records. When the state value actually changes, watchers receive a `next` event containing `prev`, `next`, and optional `reason`; when a state slot and watcher disconnect due to lifecycle, watchers may receive a `disconnect` event. StateEvent carries no render scheduling semantics.


criteria:
  - id: C-STATE-0011-A
    text:
      zh-CN: "state value 从 `prev` 转换到 `next` 时，watcher 必须接收 `{ type: 'next', prev, next, reason? }` 形状的 StateEvent。"
      en: "When a state value transitions from `prev` to `next`, watchers must receive a StateEvent shaped as `{ type: 'next', prev, next, reason? }`."
  - id: C-STATE-0011-B
    text:
      zh-CN: 当 `Object.is(prev, next)` 为 true 时，该写入不得被视为实际 state change。
      en: When `Object.is(prev, next)` is true, that write must not be treated as an actual state change.
  - id: C-STATE-0011-C
    text:
      zh-CN: '`setDefault(...)` 不得派发 `next` StateEvent。'
      en: '`setDefault(...)` must not dispatch `next` StateEvents.'
  - id: C-STATE-0011-D
    text:
      zh-CN: "state slot 与 watcher 因 unmount/dispose 断开时，可以派发 `{ type: 'disconnect', reason: 'unmount' }`。"
      en: "When a state slot and watcher disconnect due to unmount/dispose, `{ type: 'disconnect', reason: 'unmount' }` may be dispatched."
  - id: C-STATE-0011-E
    text:
      zh-CN: re-entrant `set(...)` 触发的 StateEvent 必须以确定性顺序派发，不得丢失已记录的状态转换。
      en: StateEvents caused by re-entrant `set(...)` calls must be delivered in deterministic order and must not lose recorded state transitions.
