id: C-STATE-INTERACTION-0001
type: contract
title: Official interaction and accessibility semantic states are borrowed in v0
status: draft
since: 0.1.0
summary: '`def.state.fromInteraction` and `fromAccessibility` return shared borrowed views for official semantic state slots in v0.'
statement:
  zh-CN: >-
    v0 中，`def.state.fromInteraction(name)` 与 `def.state.fromAccessibility(name)` 返回官方语义 state slot 的 shared borrowed view。它们不是当前原型直接创建的 private state，但当前原型被授权读取、设置默认值、设置当前值与观察变化，以便在 adapter/module 尚不能绝对保证真实交互状态时，原型作者仍能维护并“一口咬定”官方语义状态。


  en: >-
    In v0, `def.state.fromInteraction(name)` and `def.state.fromAccessibility(name)` return shared borrowed views for official semantic state slots. They are not private state directly created by the current prototype, but the prototype is authorized to read, set defaults, set current values, and observe changes so authors can still maintain and assert official semantic state while adapters/modules cannot yet absolutely guarantee real interaction state.


criteria:
  - id: C-STATE-INTERACTION-0001-A
    text:
      zh-CN: '`def.state.fromInteraction(name)` 必须是 setup-only API，并返回 borrowed view。'
      en: '`def.state.fromInteraction(name)` must be a setup-only API and return a borrowed view.'
  - id: C-STATE-INTERACTION-0001-B
    text:
      zh-CN: '`def.state.fromAccessibility(name)` 必须是 setup-only API，并返回 borrowed view。'
      en: '`def.state.fromAccessibility(name)` must be a setup-only API and return a borrowed view.'
  - id: C-STATE-INTERACTION-0001-C
    text:
      zh-CN: 同一组件实例内，同名 interaction semantic state 必须返回同一个 shared state slot view。
      en: Within the same component instance, the same interaction semantic state name must return the same shared state slot view.
  - id: C-STATE-INTERACTION-0001-D
    text:
      zh-CN: 同一组件实例内，同名 accessibility semantic state 必须返回同一个 shared state slot view。
      en: Within the same component instance, the same accessibility semantic state name must return the same shared state slot view.
  - id: C-STATE-INTERACTION-0001-E
    text:
      zh-CN: 官方 interaction/accessibility semantic state 必须能够被 rule、expose 与 adapter optimization 作为 state-shaped semantic input 消费。
      en: Official interaction/accessibility semantic state must be consumable by rule, expose, and adapter optimization as state-shaped semantic input.
  - id: C-STATE-INTERACTION-0001-F
    text:
      zh-CN: 当前 borrowed 决策不得被解释为放弃长期 observed projection 方向；observed 收敛仍作为治理 debt 记录。
      en: The current borrowed decision must not be interpreted as abandoning the long-term observed-projection direction; observed convergence remains recorded as governance debt.
