id: C-EVENT-TOKEN-0001
type: contract
title: Event tokens expose stable diagnostic metadata
status: draft
since: 0.1.0
summary: EventListenerToken metadata describes the registration for diagnostics only and must not affect matching, dispatch, or removal behavior.
statement:
  zh-CN: >-
    `EventListenerToken` 必须携带最小可读 metadata，以帮助原型作者、工具链与诊断系统理解该 token 对应的 registration。metadata 至少包含 registration kind 与 event type，并可以包含 options 摘要与开发期 label。metadata 只能用于可读性、诊断和追踪，不得参与 event matching、dispatch、deduplication 或 removal 语义。


  en: >-
    `EventListenerToken` must carry minimal readable metadata to help prototype authors, tooling, and diagnostics understand the registration represented by the token. Metadata must at least contain the registration kind and event type, and may contain an options summary and development-time label. Metadata may only be used for readability, diagnostics, and traceability; it must not participate in event matching, dispatch, deduplication, or removal semantics.


criteria:
  - id: C-EVENT-TOKEN-0001-A
    text:
      zh-CN: '`EventListenerToken.meta.kind` 必须为 `root` 或 `global`，并必须与创建该 token 的 registration scope 一致。'
      en: '`EventListenerToken.meta.kind` must be `root` or `global` and must match the registration scope that created the token.'
  - id: C-EVENT-TOKEN-0001-B
    text:
      zh-CN: '`EventListenerToken.meta.type` 必须记录创建该 token 时使用的 event type string。'
      en: '`EventListenerToken.meta.type` must record the event type string used when creating the token.'
  - id: C-EVENT-TOKEN-0001-C
    text:
      zh-CN: token metadata 可以包含 `options` 或 `label`，但这些字段不得影响 event matching、dispatch、deduplication 或 removal。
      en: Token metadata may include `options` or `label`, but these fields must not affect event matching, dispatch, deduplication, or removal.
  - id: C-EVENT-TOKEN-0001-D
    text:
      zh-CN: 除通过 `token.desc(text)` 设置的开发期 label 外，token metadata 在 token 生命周期内必须保持稳定。
      en: Except for development-time labels set through `token.desc(text)`, token metadata must remain stable for the lifetime of the token.
  - id: C-EVENT-TOKEN-0001-E
    text:
      zh-CN: '`token.desc(text)` 必须是 setup-only，并且必须返回同一个 token instance。'
      en: '`token.desc(text)` must be setup-only and must return the same token instance.'
  - id: C-EVENT-TOKEN-0001-F
    text:
      zh-CN: 生产构建中 `token.desc(text)` 可以 no-op，但必须保持可调用并返回同一个 token instance。
      en: In production builds, `token.desc(text)` may be a no-op, but it must remain callable and return the same token instance.
