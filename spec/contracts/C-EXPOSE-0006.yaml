id: C-EXPOSE-0006
type: contract
title: Expose value represents read-only outward information
status: draft
since: 0.1.0
summary: Expose value declares that a component provides a value-like piece of outward information to the App Maker.
statement:
  zh-CN: >-
    `def.expose.value(key, value)` 表示组件承诺向 App Maker 提供一份 value-like outward information。它适合内部常量、静态配置或不需要变更通知的只读信息。v0 暂不把 expose value 固化为 JSON-only portable value；若暴露 mutable object 或 host-local object，其可移植性与变化语义不得被自动假设。


  en: >-
    `def.expose.value(key, value)` means the component promises a value-like piece of outward information to the App Maker. It fits internal constants, static configuration, or readonly information that does not need change notification. v0 does not yet stabilize expose values as JSON-only portable values; if a mutable object or host-local object is exposed, its portability and change semantics must not be assumed automatically.


criteria:
  - id: C-EXPOSE-0006-A
    text:
      zh-CN: expose value 必须表示 App Maker 可读取的 value-like outward information。
      en: Expose values must represent value-like outward information readable by the App Maker.
  - id: C-EXPOSE-0006-B
    text:
      zh-CN: expose value 适合常量、静态配置或不需要变更通知的只读信息。
      en: Expose values fit constants, static configuration, or readonly information that does not need change notification.
  - id: C-EXPOSE-0006-C
    text:
      zh-CN: v0 不得要求所有 expose value 都满足 JSON value boundary。
      en: v0 must not require every expose value to satisfy the JSON value boundary.
  - id: C-EXPOSE-0006-D
    text:
      zh-CN: 暴露 mutable value 不得被解释为 automatic subscription、dependency tracking 或 reactive update 语义。
      en: Exposing a mutable value must not be interpreted as automatic subscription, dependency tracking, or reactive update semantics.
  - id: C-EXPOSE-0006-E
    text:
      zh-CN: 若需要对外通知变化，组件应暴露 state、outward signal 或显式订阅 API，而不是依赖 mutable value 被观察。
      en: If change notification is needed, the component should expose state, an outward signal, or an explicit subscription API instead of relying on observing a mutable value.
openQuestions:
  - id: C-EXPOSE-0006-Q-PORTABILITY
    question:
      zh-CN: expose value 是否应在未来被收窄到 JSON-compatible value，或区分 portable value 与 host-local escape hatch？
      en: Should expose values be narrowed to JSON-compatible values in the future, or should Proto UI distinguish portable values from host-local escape hatches?
    context:
      zh-CN: Props 已经要求 JSON value boundary；Expose value 当前可能承载函数、对象或宿主相关值。是否要收紧，需要考虑 method/state/event 分类已经覆盖了许多非 JSON 能力。
      en: Props already requires a JSON value boundary; Expose value may currently carry functions, objects, or host-related values. Tightening this requires considering that method/state/event classifications already cover many non-JSON capabilities.
    blocks:
      - expose value portability policy
sources:
