id: C-EVENT-0007
type: contract
title: Event bindings are cleaned up with component lifecycle
status: draft
since: 0.1.0
summary: Event bindings must unbind on component teardown, and target replacement must be transparent to prototype authors.
statement:
  zh-CN: >-
    Event binding 生命周期必须由 runtime/adapter 管理，并对原型作者透明。所有通过 `def.event` 注册的 listener 必须在组件实例 unmount/dispose 时自动解绑并清理；如果 runtime 或 adapter 在实例存活期间替换 root/global target，后续 event binding 必须指向新的 target，原型作者不需要也不得负责管理 target 迁移。


  en: >-
    Event binding lifecycle must be managed by the runtime/adapter and remain transparent to prototype authors. All listeners registered through `def.event` must be automatically unbound and cleaned up when the component instance unmounts or is disposed; if the runtime or adapter replaces root/global targets during the instance lifetime, subsequent event bindings must point at the new targets, and prototype authors must not need or be allowed to manage target migration.


criteria:
  - id: C-EVENT-0007-A
    text:
      zh-CN: 通过 `def.event` 注册的所有 listener 必须在组件实例 unmount/dispose 时自动解绑。
      en: All listeners registered through `def.event` must be automatically unbound when the component instance unmounts or is disposed.
  - id: C-EVENT-0007-B
    text:
      zh-CN: 组件实例 unmount/dispose 后，已注册 event callback 不得再因残留宿主事件而被调用。
      en: After the component instance unmounts or is disposed, registered event callbacks must not be invoked by leftover host events.
  - id: C-EVENT-0007-C
    text:
      zh-CN: runtime/adapter 替换 root/global target 后，后续 event binding 必须使用新的 target。
      en: After the runtime/adapter replaces root/global targets, subsequent event bindings must use the new targets.
  - id: C-EVENT-0007-D
    text:
      zh-CN: target 替换必须对原型作者透明；原型作者不得需要持有或更新 target 引用。
      en: Target replacement must be transparent to prototype authors; prototype authors must not need to hold or update target references.
  - id: C-EVENT-0007-E
    text:
      zh-CN: Event cleanup 与 target migration 的实现策略不由本契约规定，可以通过 rebinding、stable wrapper、delegation 或其他 adapter/runtime 机制实现。
      en: The implementation strategy for Event cleanup and target migration is not prescribed by this contract; it may use rebinding, stable wrappers, delegation, or other adapter/runtime mechanisms.
