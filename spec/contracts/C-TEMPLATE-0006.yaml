    - C-TEMPLATE-0001
  knowledge:
    - K-PROTOTYPE-COMPOSITION-0001
revisions:
  - version: 0.1.0
    change: introduced
    summary: Captured adapter/compiler negative conformance behavior for PrototypeRef template types.
tags:
