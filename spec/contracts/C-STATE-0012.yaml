id: C-STATE-0012
type: contract
title: State views are bound to instance lifecycle
status: draft
since: 0.1.0
summary: State views remain usable while the instance is alive and become invalid after dispose.
statement:
  zh-CN: >-
    State view 必须绑定到组件实例生命周期。实例仍然存活时，包括 `unmounted` callback 执行期间，允许符合 phase 规则的 view 操作；实例 dispose 后，所有 state view API 与 watch registration 都必须不可继续使用。


  en: >-
    State views must be bound to the component instance lifecycle. While the instance is still alive, including during the `unmounted` callback, view operations that satisfy phase rules are allowed; after instance dispose, all state view APIs and watch registrations must no longer be usable.


criteria:
  - id: C-STATE-0012-A
    text:
      zh-CN: 实例存活期间，state view API 必须按 phase 规则可用。
      en: While the instance is alive, state view APIs must remain available according to phase rules.
  - id: C-STATE-0012-B
    text:
      zh-CN: '`unmounted` callback 执行期间实例仍被视为存活；符合 runtime phase 的 state 操作必须允许。'
      en: During the `unmounted` callback, the instance is still considered alive; state operations valid in the runtime phase must be allowed.
  - id: C-STATE-0012-C
    text:
      zh-CN: 实例 dispose 后调用 `get()`、`setDefault(...)`、`set(...)` 或 `watch(...)` 必须失败。
      en: After instance dispose, calling `get()`, `setDefault(...)`, `set(...)`, or `watch(...)` must fail.
  - id: C-STATE-0012-D
    text:
      zh-CN: 实例 dispose 必须清理 watch registration 与内部 state subscription。
      en: Instance dispose must clean up watch registrations and internal state subscriptions.
  - id: C-STATE-0012-E
    text:
      zh-CN: dispose 之后不得再从残留 state subscription 调用 watcher callback。
      en: After dispose, watcher callbacks must not be invoked by leftover state subscriptions.
