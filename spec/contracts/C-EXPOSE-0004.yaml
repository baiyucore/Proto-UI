id: C-EXPOSE-0004
type: contract
title: Expose keys form an instance exposes record
status: draft
since: 0.1.0
summary: Expose entries are identified by stable non-empty string keys and presented to the App Maker as an instance-level exposes record.
statement:
  zh-CN: >-
    每个 expose entry 必须由当前组件实例 exposes record 内唯一的非空 string key 标识。所有 expose 分类共享同一个 key namespace：某个 key 一旦用于暴露 value、state、method 或 outward signal 中的一类，就不能再用于另一类 expose entry。adapter 可以用最符合宿主习惯的方式向 App Maker 暴露该 record 或按 key 访问能力，但不得让 App Maker 通过取得的 record 直接篡改内部 expose registry。


  en: >-
    Each expose entry must be identified by a non-empty string key that is unique within the current component instance exposes record. All expose classifications share the same key namespace: once a key is used to expose a value, state, method, or outward signal, it cannot be reused for another expose entry category. An adapter may expose that record, or per-key access to it, using host-idiomatic surfaces, but must not allow the App Maker to mutate the internal expose registry by mutating the returned record.


criteria:
  - id: C-EXPOSE-0004-A
    text:
      zh-CN: expose key 必须是非空 string。
      en: Expose keys must be non-empty strings.
  - id: C-EXPOSE-0004-B
    text:
      zh-CN: 同一组件实例 exposes record 内重复注册同一个 key 必须失败。
      en: Registering the same key twice within one component instance exposes record must fail.
  - id: C-EXPOSE-0004-C
    text:
      zh-CN: value、state、method 与 outward signal expose entries 必须共享同一个 key namespace；不同分类之间也不得重复使用同一个 key。
      en: Value, state, method, and outward-signal expose entries must share the same key namespace; the same key must not be reused across different classifications.
  - id: C-EXPOSE-0004-D
    text:
      zh-CN: adapter 必须让 App Maker 能以 key 为单位访问已注册 exposes，或读取完整 exposes record。
      en: Adapters must let the App Maker access registered exposes by key, or read the full exposes record.
  - id: C-EXPOSE-0004-E
    text:
      zh-CN: App Maker 取得的 exposes record 不得是可直接篡改内部 expose registry 的 live mutable registry。
      en: The exposes record obtained by the App Maker must not be a live mutable registry that can directly mutate the internal expose registry.
  - id: C-EXPOSE-0004-F
    text:
      zh-CN: 未注册 key 的读取结果、错误或 fallback 形态由 adapter 或更具体 expose surface 契约定义，但不得伪造为已注册 entry。
      en: The result, error, or fallback shape for reading an unregistered key is defined by adapters or more specific expose-surface contracts, but must not be forged as a registered entry.
