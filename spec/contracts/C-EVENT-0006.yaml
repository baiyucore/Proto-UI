id: C-EVENT-0006
type: contract
title: EventListenerToken is the precise removal handle
status: draft
since: 0.1.0
summary: Each event registration returns an EventListenerToken, and `def.event.off(token)` removes exactly that registration.
statement:
  zh-CN: >-
    Event registration 的 portable removal 机制必须是 token-based。每一次 `def.event.on(...)` 或 `def.event.onGlobal(...)` 调用必须返回一个 `EventListenerToken`，该 token 以稳定且实例内唯一的 `id` 标识单个 registration。`def.event.off(token)` 必须只移除 token 指向的那一条 registration；若该 registration 已绑定到 target，移除必须立即 detach。未知 token 或已移除 token 必须 no-op，非法 token shape 必须确定性抛错。


  en: >-
    The portable removal mechanism for event registrations must be token-based. Each call to `def.event.on(...)` or `def.event.onGlobal(...)` must return an `EventListenerToken`, and that token identifies a single registration through a stable id unique within the instance. `def.event.off(token)` must remove exactly the registration identified by that token; if the registration is already bound to a target, removal must detach it immediately. Unknown or already-removed tokens must be no-ops, and invalid token shapes must throw deterministically.


criteria:
  - id: C-EVENT-0006-A
    text:
      zh-CN: 每次 `def.event.on(...)` 与 `def.event.onGlobal(...)` 调用都必须返回一个 `EventListenerToken`。
      en: Each `def.event.on(...)` and `def.event.onGlobal(...)` call must return an `EventListenerToken`.
  - id: C-EVENT-0006-B
    text:
      zh-CN: '`EventListenerToken.id` 必须是当前组件实例内稳定且唯一的字符串。'
      en: '`EventListenerToken.id` must be a stable string unique within the current component instance.'
  - id: C-EVENT-0006-C
    text:
      zh-CN: '`def.event.off(token)` 必须只移除 token 标识的 registration，不得按 `(type, cb, options)` 匹配移除。'
      en: '`def.event.off(token)` must remove only the registration identified by the token, and must not remove by matching `(type, cb, options)`.'
  - id: C-EVENT-0006-D
    text:
      zh-CN: 若 token 标识的 registration 当前已绑定，`off(token)` 必须立即 detach 对应 listener。
      en: If the registration identified by the token is currently bound, `off(token)` must detach the corresponding listener immediately.
  - id: C-EVENT-0006-E
    text:
      zh-CN: 对未知 token 或已移除 token 调用 `off(token)` 必须 no-op。
      en: Calling `off(token)` with an unknown or already-removed token must be a no-op.
  - id: C-EVENT-0006-F
    text:
      zh-CN: 对非法 token shape 调用 `off(token)` 必须抛出 invalid-argument 类错误。
      en: Calling `off(token)` with an invalid token shape must throw an invalid-argument error.
