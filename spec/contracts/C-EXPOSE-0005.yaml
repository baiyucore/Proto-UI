id: C-EXPOSE-0005
type: contract
title: Classified expose APIs declare value, state, method, and signal surfaces
status: draft
since: 0.1.0
summary: Classified expose APIs add semantic categories over the base registration model without changing core registration, key, or lifecycle rules.
statement:
  zh-CN: >-
    Expose v0 将组件对 App Maker 的 outward surface 分为 value、state、method 与 outward signal 四类。exposes record 中的每个 value 都必须归入这些 expose 方式之一。`def.expose.value`、`def.expose.state`、`def.expose.method` 与 `def.expose.event` 只是为 base expose registration 增加语义分类与 adapter mapping 入口；它们不改变 setup-only、shared key namespace 与 lifecycle 等基础规则。


  en: >-
    Expose v0 classifies component-to-App-Maker outward surfaces as value, state, method, and outward signal. Every value in an exposes record must belong to one of these expose modes. `def.expose.value`, `def.expose.state`, `def.expose.method`, and `def.expose.event` add semantic categories and adapter mapping entry points over base expose registration; they do not change setup-only, shared key namespace, or lifecycle rules.


criteria:
  - id: C-EXPOSE-0005-A
    text:
      zh-CN: exposes record 中的每个 entry value 必须归入 value、state、method 或 outward signal 之一。
      en: Every entry value in an exposes record must be classified as value, state, method, or outward signal.
  - id: C-EXPOSE-0005-B
    text:
      zh-CN: '`def.expose.value(key, value)` 必须表示 value classified expose surface。'
      en: '`def.expose.value(key, value)` must represent a value-classified expose surface.'
  - id: C-EXPOSE-0005-C
    text:
      zh-CN: '`def.expose.state(key, handle)` 必须表示 state classified expose surface，并由 expose-state 契约定义外部 view。'
      en: '`def.expose.state(key, handle)` must represent a state-classified expose surface, whose external view is defined by expose-state contracts.'
  - id: C-EXPOSE-0005-D
    text:
      zh-CN: '`def.expose.method(key, fn)` 必须表示 method classified expose surface。'
      en: '`def.expose.method(key, fn)` must represent a method-classified expose surface.'
  - id: C-EXPOSE-0005-E
    text:
      zh-CN: '`def.expose.event(key, spec?)` 必须表示 outward signal classified expose surface。'
      en: '`def.expose.event(key, spec?)` must represent an outward-signal-classified expose surface.'
  - id: C-EXPOSE-0005-F
    text:
      zh-CN: classified API 必须继承 base expose registration 的 setup-only、shared key namespace 与 lifecycle 规则。
      en: Classified APIs must inherit setup-only, shared key namespace, and lifecycle rules from base expose registration.
openQuestions:
  - id: C-EXPOSE-0005-Q-EVENT-NAMING
    question:
      zh-CN: outward signal 的公开 API 是否应继续命名为 `expose.event`，还是迁移为 `expose.signal`？
      en: Should the outward-signal public API remain named `expose.event`, or migrate to `expose.signal`?
    context:
      zh-CN: '`event` 对 Web 开发者更直觉，但容易和 User → Component 的 Event 通路混淆；`signal` 语义更准确，但生态直觉较弱。'
      en: '`event` is more intuitive to web developers, but can be confused with the User → Component Event channel; `signal` is semantically clearer, but less ecosystem-intuitive.'
    blocks:
      - expose outward signal API naming
sources:
  - path: internal/contracts/expose/expose-classification.v0.md
