dependsOn:
  contracts:
    - C-EXPOSE-0003
    - C-EXPOSE-0004
explains:
  decisions:
    - D-EXPOSE-EVENT-NAMING-0001
revisions:
  - version: 0.1.0
    change: introduced
    summary: Captured value, state, method, and outward-signal expose classifications.
  - version: 0.1.0
    change: revised
    summary: Clarified that each exposes record value belongs to one expose mode and shares the base key namespace.
