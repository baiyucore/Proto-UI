id: C-STATE-0009
type: contract
title: Observed state view represents read-only observation
status: draft
since: 0.1.0
summary: An observed state view is used when the current prototype may observe a state but has no authority to control it.
statement:
  zh-CN: >-
    Observed state view 表示该 state 完全不受当前原型控制，当前原型只能读取并观察它。observed view 不得提供 `setDefault` 或 `set`，以维持状态事实来源与状态消费者之间的只读边界。


  en: >-
    An observed state view means the state is entirely outside the current prototype's control, and the prototype may only read and observe it. Observed views must not provide `setDefault` or `set`, preserving a read-only boundary between the source of state facts and their consumers.


criteria:
  - id: C-STATE-0009-A
    text:
      zh-CN: 当前原型完全不能控制的 state 必须使用 observed view。
      en: State that the current prototype cannot control at all must use an observed view.
  - id: C-STATE-0009-B
    text:
      zh-CN: Observed view 必须提供 `get()`。
      en: Observed views must provide `get()`.
  - id: C-STATE-0009-C
    text:
      zh-CN: Observed view 必须提供 setup-only `watch(...)`。
      en: Observed views must provide setup-only `watch(...)`.
  - id: C-STATE-0009-D
    text:
      zh-CN: Observed view 不得提供 `setDefault(...)`。
      en: Observed views must not provide `setDefault(...)`.
  - id: C-STATE-0009-E
    text:
      zh-CN: Observed view 不得提供 `set(...)`。
      en: Observed views must not provide `set(...)`.
sources:
