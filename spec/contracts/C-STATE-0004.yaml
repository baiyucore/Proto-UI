id: C-STATE-0004
type: contract
title: State view APIs obey setup and runtime phase boundaries
status: draft
since: 0.1.0
summary: 'State view operations have explicit phase boundaries: `get` is phase-neutral, `setDefault` and `watch` are setup-only, and `set` is runtime-only.'
statement:
  zh-CN: >-
    State 定义发生在 setup 期间，但 state view 作为状态机视图会跨 setup 与 runtime 存在。view 上的 API 必须遵守各自的 phase 边界：`get()` 在 setup 与 runtime 都可用，`setDefault(...)` 与 `watch(...)` 只能在 setup 期间调用，`set(...)` 只能在 runtime callback 期间调用。


  en: >-
    State definition happens during setup, but state views survive across setup and runtime as state-machine views. APIs on those views must follow their phase boundaries: `get()` is available during both setup and runtime, `setDefault(...)` and `watch(...)` are setup-only, and `set(...)` is runtime-callback-only.


criteria:
  - id: C-STATE-0004-A
    text:
      zh-CN: '`get()` 必须允许在 setup 与 runtime 期间读取当前 state value；setup 期间读取到的始终是当前默认值。'
      en: '`get()` must allow reading the current state value during both setup and runtime; during setup it always reads the current default value.'
  - id: C-STATE-0004-B
    text:
      zh-CN: '`setDefault(...)` 必须是 setup-only API；runtime 期间调用必须失败。'
      en: '`setDefault(...)` must be a setup-only API; calling it during runtime must fail.'
  - id: C-STATE-0004-C
    text:
      zh-CN: '`set(...)` 必须是 runtime-callback-only API；setup 期间调用必须失败。'
      en: '`set(...)` must be a runtime-callback-only API; calling it during setup must fail.'
  - id: C-STATE-0004-D
    text:
      zh-CN: '`watch(...)` 必须是 setup-only registration API；runtime 期间动态注册 watcher 必须失败。'
      en: '`watch(...)` must be a setup-only registration API; dynamically registering watchers during runtime must fail.'
  - id: C-STATE-0004-E
    text:
      zh-CN: phase guard 可以由 runtime/module wrapper 执行；底层 state kernel 可以保持 phase-agnostic，但不得削弱公开 API 的 phase 语义。
      en: Phase guards may be enforced by runtime/module wrappers; the lower-level state kernel may remain phase-agnostic, but it must not weaken the public API phase semantics.
