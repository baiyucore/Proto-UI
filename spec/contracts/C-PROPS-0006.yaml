dependsOn:
  contracts:
    - id: C-PROPS-0003
      role: value-boundary
      coverageImpact: expands-test-surface
      note: Prop declaration descriptors may carry `default` or `fallback` candidate values; those values must use the JSON value boundary.
refines:
