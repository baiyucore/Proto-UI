id: C-EXPOSE-STATE-0001
type: contract
title: Expose state projects internal state as an App-Maker-facing view
status: draft
since: 0.1.0
summary: Expose-state projects an internal state slot to the App Maker as a read-only external state handle with value access, subscription, and state spec metadata.
statement:
  zh-CN: >-
    Expose-state 是 Expose 与 State 的交叉模块。组件可以通过 `def.expose.state(key, handle)`，或等价地暴露 state handle，让 App Maker 获得该内部 state slot 的外部 view。App Maker 拿到的不是裸 state slot，也不是原型作者侧 owned、borrowed 或 observed view；它是翻译层/adapter 面向 App Maker 的 external state handle。


  en: >-
    Expose-state is the intersection module between Expose and State. A component may use `def.expose.state(key, handle)`, or equivalently expose a state handle, so the App Maker receives an external view of that internal state slot. The App Maker does not receive the raw state slot, nor a prototype-author-side owned, borrowed, or observed view; it receives a translation-layer or adapter-facing external state handle.


criteria:
  - id: C-EXPOSE-STATE-0001-A
    text:
      zh-CN: expose-state 必须被识别为 Expose 与 State 的交叉模块，而不是 State 本域或 Expose 本域单独定义的全部语义。
      en: Expose-state must be identified as an intersection module between Expose and State, not as semantics fully defined by State alone or Expose alone.
  - id: C-EXPOSE-STATE-0001-B
    text:
      zh-CN: App Maker 通过 expose-state 获得的 state 必须是 external state handle，而不是原型作者侧 owned、borrowed 或 observed view。
      en: State obtained by the App Maker through expose-state must be an external state handle, not a prototype-author-side owned, borrowed, or observed view.
  - id: C-EXPOSE-STATE-0001-C
    text:
      zh-CN: 'external state handle 必须至少提供 `get(): V`。'
      en: 'External state handles must provide at least `get(): V`.'
  - id: C-EXPOSE-STATE-0001-D
    text:
      zh-CN: external state handle 必须提供 subscription 能力，例如 `subscribe(cb)` 返回 unsubscribe，或等价 `unsubscribe(token)` 机制。
      en: External state handles must provide subscription capability, such as `subscribe(cb)` returning an unsubscribe function, or an equivalent `unsubscribe(token)` mechanism.
  - id: C-EXPOSE-STATE-0001-E
    text:
      zh-CN: 'external state handle 必须暴露只读 `spec: StateSpec`，用于描述状态值域。'
      en: 'External state handles must expose readonly `spec: StateSpec` metadata describing the state value domain.'
  - id: C-EXPOSE-STATE-0001-F
    text:
      zh-CN: external state handle 不得提供 `set`、`setDefault` 或其他 App Maker 写入 state slot 的能力。
      en: External state handles must not provide `set`, `setDefault`, or any other App Maker write capability for the state slot.
  - id: C-EXPOSE-STATE-0001-G
    text:
      zh-CN: external `get()` 必须反映同源 internal state 的当前值；internal state 变化应通过 external subscription 通知 App Maker。
      en: External `get()` must reflect the current value of the same-source internal state; internal state changes should notify the App Maker through external subscriptions.
  - id: C-EXPOSE-STATE-0001-H
    text:
      zh-CN: external subscription callback 的 event shape 应与 StateEvent 对齐，但不得携带 prototype-author `run handle`。
      en: External subscription callback event shape should align with StateEvent, but must not carry a prototype-author `run handle`.
sources:
